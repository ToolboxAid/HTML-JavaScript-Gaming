name: Platform Validation

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  platform-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Platform Validation Suite
        run: node ./scripts/run-platform-validation-suite.mjs
