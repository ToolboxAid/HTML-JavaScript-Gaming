<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Replay Visualizer</title>
  <link rel="stylesheet" href="../../src/engine/theme/main.css" />
  <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css" />
  <link rel="stylesheet" href="../shared/platformShell.css" />
  <link rel="stylesheet" href="../shared/debugInspectorTools.css" />
</head>
<body class="tools-platform-tool-page tool-shell-page" data-tool-id="replay-visualizer" data-tools-platform-page="tool">
  <div data-tools-platform-header></div>
  <div class="tool-shell-container">
    <div class="tool-shell app-shell">
      <aside class="tool-shell__left">
        <section class="panel debug-tool-panel">
          <h2>Replay Visualizer</h2>
          <p>Load replay/event payload JSON, scrub timeline state, and inspect frame-by-frame event details.</p>
          <div class="debug-tool-actions">
            <button type="button" id="loadReplayButton">Load Replay JSON</button>
            <button type="button" id="loadSampleReplayButton">Load Sample Replay</button>
            <button type="button" id="playReplayButton">Play</button>
            <button type="button" id="pauseReplayButton">Pause</button>
            <button type="button" id="resetReplayButton">Reset</button>
          </div>
          <div id="replayStatusText" class="debug-tool-meta">Replay visualizer ready.</div>
        </section>
      </aside>

      <main class="tool-shell__center">
        <section class="panel debug-tool-panel">
          <h3>Replay Input</h3>
          <textarea id="replayJsonInput" rows="14" placeholder='{"events":[{"timeMs":0,"type":"boot"}]}'></textarea>
          <div class="debug-tool-timeline">
            <label>
              Timeline (ms)
              <input id="replayTimeSlider" type="range" min="0" max="1000" step="1" value="0" />
            </label>
            <div id="replayTimeReadout" class="debug-tool-meta">t=0ms</div>
          </div>
        </section>
      </main>

      <aside class="tool-shell__right">
        <section class="panel debug-tool-panel">
          <h3>Event Timeline</h3>
          <ul id="replayEventList" class="debug-tool-list"></ul>
          <pre id="replayEventOutput" class="debug-tool-readout">Load replay JSON to inspect event frames.</pre>
        </section>
      </aside>
    </div>
  </div>
  <div data-tools-platform-status></div>
  <script type="module" src="../shared/platformShell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
