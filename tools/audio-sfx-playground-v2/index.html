<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio / SFX Playground V2</title>
    <link rel="stylesheet" href="../../src/engine/theme/main.css">
    <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css">
    <link rel="stylesheet" href="../../src/engine/theme/accordionV2/accordionV2.css">
    <link rel="stylesheet" href="../_templates-v2/styles/toolStarter.css">
    <link rel="stylesheet" href="./styles/audioSfxLayoutDensity.css">
    <script type="module" src="./js/bootstrap.js"></script>
  </head>
  <body class="tools-platform-tool-page tools-platform-surface hub-page-tools" data-tool-id="audio-sfx-playground-v2">
    <details class="is-collapsible" open>
      <summary class="is-collapsible__summary" data-audio-sfx-summary>Hide Header and Details</summary>
      <div class="is-collapsible__content">
        <div id="shared-theme-header"></div>
        <div class="tool-starter__header" data-audio-sfx-header>
          <section class="tools-platform-frame tool-starter__local-shell-frame">
            <div class="tools-platform-frame__accordion-content">
              <div class="tools-platform-frame__accordion-summary">
                <div class="tools-platform-frame__summary-copy">
                  <h1 class="tools-platform-frame__title" data-tool-id="audio-sfx-playground-v2">Audio / SFX Playground V2</h1>
                  <h2 class="tools-platform-frame__eyebrow">First-Class Tools Surface V2</h2>
                </div>
                <div class="tools-platform-frame__summary-meta">
                  <div class="tools-platform-frame__meta">Browser SFX preview, tuning, and toolState export without a tools/shared dependency.</div>
                </div>
              </div>
              <div class="tools-platform-frame__topline">
                <p class="tools-platform-frame__description">Shape short oscillator and noise-based game effects, audition them, and inspect the exported audio payload.</p>
              </div>
            </div>
          </section>
        </div>
      </div>
    </details>

    <nav class="tool-starter__menu tool-starter__tool__menu audio-sfx__tool__menu" aria-label="Tool actions" data-launch-mode-nav="tool">
      <button id="toolImportJsonButton" type="button">Import JSON</button>
      <button id="toolCopyJsonButton" type="button">Copy JSON</button>
      <button id="toolExportToolStateButton" type="button">Export JSON</button>
      <input id="toolImportJsonInput" type="file" accept="application/json,.json" hidden>
    </nav>

    <nav class="tool-starter__menu tool-starter__workspace__menu audio-sfx__workspace__menu" aria-label="Workspace actions" data-launch-mode-nav="workspace" hidden>
      <button id="workspaceImportManifestButton" type="button">Import manifest</button>
      <button id="workspaceCopyManifestButton" type="button">Copy manifest</button>
      <button id="workspaceExportManifestButton" type="button">Export manifest</button>
      <button id="returnToWorkspaceButton" type="button" hidden>Return to Workspace</button>
    </nav>

    <main class="tool-starter app-shell" data-tool-id="audio-sfx-playground-v2">
      <aside class="tool-starter__panel tool-starter__panel--left" aria-label="SFX setup">
        <section class="accordion-v2 tool-starter__accordion is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="sfxShapeContent">
            <span>SFX Shape</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="sfxShapeContent" class="accordion-v2__content">
            <div class="tool-starter__field audio-sfx__name-field">
              <label for="nameInput">
                <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Names this sound in the tile list and exported toolState.">Name</span>
              </label>
              <input id="nameInput" type="text" maxlength="48" autocomplete="off">
              <button id="addSfxButton" type="button" aria-label="Add SFX">+</button>
              <button id="deleteSfxButton" type="button" aria-label="Delete selected SFX">&#128465;</button>
            </div>
            <label class="tool-starter__field" for="styleProfileSelect">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Changes recommended slider operating ranges and clamps current values; waveform choices are never disabled by style.">Sound Style</span>
              <select id="styleProfileSelect">
                <option value="custom">Custom</option>
                <option value="pure-tone">Pure Tone</option>
                <option value="noise-only">Noise Only</option>
                <option value="divider" disabled>────────────</option>
                <option value="atari-style">Atari-style</option>
                <option value="classic-arcade">Classic Arcade</option>
                <option value="early-analog">Early Analog</option>
                <option value="namco-style">Namco-style</option>
                <option value="nintendo-style">Nintendo-style</option>
                <option value="ttl-arcade">TTL Arcade</option>
                <option value="vector-arcade">Vector Arcade</option>
              </select>
            </label>
            <label class="tool-starter__field" for="waveformSelect">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Chooses the oscillator shape or noise source; every waveform remains selectable for every Sound Style.">Wave</span>
              <select id="waveformSelect">
                <option value="sine">Sine</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
                <option value="sawtooth">Saw</option>
                <option value="noise">Noise</option>
              </select>
            </label>
            <label class="tool-starter__field" for="frequencyInput" data-density-control="frequency">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Sets the starting pitch before any sweep is applied.">Frequency</span>
              <input id="frequencyInput" type="range">
              <output id="frequencyValue" for="frequencyInput"></output>
            </label>
            <label class="tool-starter__field" for="durationInput" data-density-control="duration">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Controls the total playback length of the effect.">Duration</span>
              <input id="durationInput" type="range">
              <output id="durationValue" for="durationInput"></output>
            </label>
            <label class="tool-starter__field" for="attackInput" data-density-control="attack">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Controls how quickly the sound reaches full volume.">Attack</span>
              <input id="attackInput" type="range">
              <output id="attackValue" for="attackInput"></output>
            </label>
            <label class="tool-starter__field" for="releaseInput" data-density-control="release">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Controls how long the sound fades out at the end.">Release</span>
              <input id="releaseInput" type="range">
              <output id="releaseValue" for="releaseInput"></output>
            </label>
            <label class="tool-starter__field" for="volumeInput" data-density-control="volume">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Sets the playback loudness for audition and export.">Volume</span>
              <input id="volumeInput" type="range">
              <output id="volumeValue" for="volumeInput"></output>
            </label>
            <label class="tool-starter__field" for="pitchSweepInput" data-density-control="sweep">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Bends pitch over time in cents, positive upward and negative downward.">Sweep</span>
              <input id="pitchSweepInput" type="range">
              <output id="pitchSweepValue" for="pitchSweepInput"></output>
            </label>
            <label class="tool-starter__toggle" for="noiseInput">
              <input id="noiseInput" type="checkbox">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Adds a short noise layer over oscillator waveforms for punchy hits and impacts.">Add Noise Layer</span>
            </label>
            <label class="tool-starter__field" for="noiseAmountInput" data-density-control="noiseAmount">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Sets how loud the arcade transient is when the noise source or layer is enabled.">Amount</span>
              <input id="noiseAmountInput" type="range">
              <output id="noiseAmountValue" for="noiseAmountInput"></output>
            </label>
            <label class="tool-starter__field" for="noiseDecayInput" data-density-control="noiseDecay">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Controls how quickly the burst fades out.">Decay</span>
              <input id="noiseDecayInput" type="range">
              <output id="noiseDecayValue" for="noiseDecayInput"></output>
            </label>
            <label class="tool-starter__field" for="noiseFilterInput" data-density-control="noiseFilter">
              <span class="audio-sfx__label-tip" tabindex="0" data-tooltip="Raises or lowers the transient brightness filter.">Brightness</span>
              <input id="noiseFilterInput" type="range">
              <output id="noiseFilterValue" for="noiseFilterInput"></output>
            </label>
            <p id="sfxValidationMessage" class="tool-starter__hint">Ready to audition.</p>
            <div class="audio-sfx__shape-actions">
              <button id="toolPlayButton" type="button">Play</button>
            </div>
          </div>
        </section>
      </aside>

      <section class="tool-starter__panel tool-starter__panel--center" aria-label="SFX sound list">
        <section class="accordion-v2 tool-starter__accordion tool-starter__accordion--fill is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="soundListContent">
            <span>Created Sounds</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="soundListContent" class="accordion-v2__content">
            <div id="sfxTileList" class="audio-sfx__tile-list" role="listbox" aria-label="Created SFX entries"></div>
          </div>
        </section>
      </section>

      <aside class="tool-starter__panel tool-starter__panel--right" aria-label="SFX output">
        <section class="accordion-v2 tool-starter__accordion audio-sfx__preview-accordion is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="previewPanelContent">
            <span>Wave Preview</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="previewPanelContent" class="accordion-v2__content">
            <div id="previewOutput" class="tool-starter__preview audio-sfx__preview" role="img" aria-label="SFX envelope and waveform preview">
              <div class="tool-starter__preview-card audio-sfx__preview-empty" aria-hidden="true"></div>
            </div>
          </div>
        </section>

        <section class="accordion-v2 tool-starter__accordion is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="inspectorContent">
            <span>Output Summary</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="inspectorContent" class="accordion-v2__content">
            <pre id="inspectorOutput" class="tool-starter__output">{}</pre>
          </div>
        </section>

        <section class="accordion-v2 tool-starter__accordion is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header tool-starter__status-accordion-header" type="button" aria-expanded="true" aria-controls="statusLogContent">
            <span>Status</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="statusLogContent" class="accordion-v2__content">
            <div class="tool-starter__status-header-actions">
              <button id="clearStatusButton" class="tool-starter__status-clear-button" type="button">Clear</button>
            </div>
            <textarea id="statusLog" readonly rows="10" aria-label="Status log"></textarea>
          </div>
        </section>
      </aside>
    </main>
    <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
  </body>
</html>
