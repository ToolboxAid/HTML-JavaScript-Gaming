<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Editor</title>
  <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css" />
  <link rel="stylesheet" href="../shared/platformShell.css" />
  <link rel="stylesheet" href="../shared/debugInspectorTools.css" />
  <link rel="stylesheet" href="./skinEditor.css" />
  <link rel="stylesheet" href="../../src/engine/theme/main.css" />
</head>
<body class="tools-platform-tool-page hub-page-tools" data-tool-id="skin-editor" data-tools-platform-page="tool">
  <details class="is-collapsible" open>
    <summary class="is-collapsible__summary">Header and Intro</summary>
    <div class="is-collapsible__content">
      <div id="shared-theme-header"></div>
      <div data-tools-platform-header></div>
    </div>
  </details>

  <div class="debug-tool-shell app-shell">
    <section class="panel debug-tool-panel">
      <div class="debug-tool-actions">
        <button type="button" id="skinEditorLoadButton" class="debug-tool-control">Load Active Skin</button>
        <button type="button" id="skinEditorSaveOverrideButton" class="debug-tool-control">Apply Skin Override</button>
        <button type="button" id="skinEditorClearOverrideButton" class="debug-tool-control">Clear Override</button>
        <label class="debug-tool-control" for="skinEditorImportInput">Import Skin JSON</label>
        <input id="skinEditorImportInput" type="file" accept="application/json,.json" hidden />
        <button type="button" id="skinEditorExportButton" class="debug-tool-control">Export Skin JSON</button>
        <button type="button" id="skinEditorOpenGameButton" class="debug-tool-control">Open Game</button>
        <button type="button" id="skinEditorHowToUseButton" class="debug-tool-control">How to Use</button>
      </div>
      <div id="skinEditorStatus" class="debug-tool-meta">Skin editor ready.</div>
    </section>

    <section class="skin-editor-workbench">
      <aside class="panel debug-tool-panel skin-editor-column skin-editor-column--left">
        <div class="skin-editor-context">
          <span id="skinEditorContextGame" class="skin-editor-chip">Game: n/a</span>
          <span id="skinEditorContextSchema" class="skin-editor-chip">Schema: n/a</span>
          <span id="skinEditorContextSource" class="skin-editor-chip">Source: n/a</span>
        </div>
        <section class="skin-editor-section skin-editor-section--shape-add">
          <h4>Object</h4>
          <div class="skin-editor-shape-add-row">
            <label for="skinEditorNewShapeType">Shape/Type</label>
            <select id="skinEditorNewShapeType" class="skin-editor-field">
              <option value="arc">Arc</option>
              <option value="capsule">Capsule</option>
              <option value="circle">Circle</option>
              <option value="hud-color">HUD Color</option>
              <option value="line">Line</option>
              <option value="oval">Oval</option>
              <option value="polygon">Polygon</option>
              <option value="rectangle">Rectangle</option>
              <option value="ring">Ring</option>
              <option value="sector">Sector</option>
              <option value="square">Square</option>
              <option value="star">Star</option>
              <option value="triangle">Triangle</option>
              <option value="wall-multi-side">Walls (1-4)</option>
              <option value="" disabled>--------------------</option>
              <option value="flattened">Flattened</option>
            </select>
          </div>
          <div class="skin-editor-shape-add-row">
            <label for="skinEditorNewShapeName">Name</label>
            <input
              id="skinEditorNewShapeName"
              class="skin-editor-field"
              type="text"
              placeholder="example: paddle, hudText, hudPanel"
              autocomplete="off"
            />
          </div>
          <div class="debug-tool-actions">
            <button type="button" id="skinEditorAddShapeButton" class="debug-tool-control">Add</button>
            <button type="button" id="skinEditorRenameObjectButton" class="debug-tool-control">Rename</button>
            <button type="button" id="skinEditorDeleteObjectButton" class="debug-tool-control">Delete</button>
            <button type="button" id="skinEditorFlattenObjectsButton" class="debug-tool-control">Flatten</button>
          </div>
        </section>
        <h3>Objects</h3>
        <div id="skinEditorObjectList" class="skin-editor-object-list" role="listbox" aria-label="Skin objects"></div>
        <div class="debug-tool-actions skin-editor-object-order-actions">
          <button type="button" id="skinEditorMoveObjectUpButton" class="debug-tool-control">Move Up</button>
          <button type="button" id="skinEditorMoveObjectDownButton" class="debug-tool-control">Move Down</button>
        </div>
      </aside>

      <section class="panel debug-tool-panel skin-editor-canvas-panel">
        <h3>Canvas Preview</h3>
        <div class="skin-editor-canvas-wrap">
          <canvas
            id="skinEditorPreviewCanvas"
            class="skin-editor-preview-canvas"
            width="960"
            height="560"
            aria-label="Selected object preview"
          ></canvas>
        </div>
        <p id="skinEditorPreviewNote" class="skin-editor-empty"></p>
      </section>

      <aside class="panel debug-tool-panel skin-editor-column skin-editor-column--right">
        <h3>Inspector</h3>
        <section class="skin-editor-section">
          <h4>Palette</h4>
          <div id="skinEditorPaletteList" class="skin-editor-palette-list"></div>
        </section>
        <section class="skin-editor-section">
          <h4>Selected Object</h4>
          <div id="skinEditorObjectControls" class="skin-editor-list"></div>
        </section>

        <section class="skin-editor-section">
          <h4>Skin JSON Input</h4>
          <textarea id="skinEditorInput" class="debug-tool-field skin-editor-json" rows="14"></textarea>
          <div class="debug-tool-actions">
            <button type="button" id="skinEditorSyncVisualButton" class="debug-tool-control">Sync Visual From JSON</button>
          </div>
        </section>
        <section class="skin-editor-section">
          <h4>Skin Summary</h4>
          <pre id="skinEditorSummary" class="debug-tool-readout">Load active skin to inspect its payload.</pre>
        </section>
      </aside>
    </section>
  </div>

  <div data-tools-platform-status></div>
  <script type="module" src="../shared/platformShell.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
</body>
</html>
