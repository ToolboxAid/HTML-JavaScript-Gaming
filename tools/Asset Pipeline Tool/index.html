<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Pipeline Tool</title>
  <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css" />
  <link rel="stylesheet" href="../shared/platformShell.css" />
  <link rel="stylesheet" href="../shared/debugInspectorTools.css" />
  <link rel="stylesheet" href="../../src/engine/theme/main.css" />
</head>
<body class="tools-platform-tool-page hub-page-tools" data-tool-id="asset-pipeline-tool" data-tools-platform-page="tool">
  <details class="is-collapsible" open>
    <summary class="is-collapsible__summary">Header and Intro</summary>
    <div class="is-collapsible__content">
      <div id="shared-theme-header"></div>
      <div data-tools-platform-header></div>
    </div>
  </details>
  <div class="debug-tool-shell app-shell">
    <section class="panel debug-tool-panel">
      <div class="debug-tool-actions">
        <button type="button" id="runAssetPipelineButton">Run Pipeline</button>
      </div>
      <div id="assetPipelineStatus" class="debug-tool-meta">Asset pipeline ready.</div>
    </section>

    <section class="debug-tool-grid">
      <section class="panel debug-tool-panel">
        <h3>Pipeline Input</h3>
        <textarea id="assetPipelineInput" rows="16"></textarea>
      </section>

      <section class="panel debug-tool-panel">
        <h3>Pipeline Output</h3>
        <pre id="assetPipelineOutput" class="debug-tool-readout">Run pipeline to inspect normalized records and manifest output.</pre>
      </section>
    </section>
  </div>
  <div data-tools-platform-status></div>
  <script type="module" src="../shared/platformShell.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
</body>
</html>
