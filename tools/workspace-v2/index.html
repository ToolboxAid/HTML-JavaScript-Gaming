<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workspace V2</title>
    <link rel="stylesheet" href="../../src/engine/theme/main.css">
    <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css">
    <link rel="stylesheet" href="../../src/engine/theme/accordionV2/accordionV2.css">
    <link rel="stylesheet" href="./styles/workspaceV2.css">
    <script type="module" src="./index.js"></script>
  </head>
  <body class="tools-platform-tool-page tools-platform-surface hub-page-tools" data-tool-id="workspace-v2">
    <div id="shared-theme-header"></div>
    <header class="workspace-v2__header">
      <section class="tools-platform-frame workspace-v2__local-shell-frame">
        <div class="tools-platform-frame__accordion-content">
          <div class="tools-platform-frame__accordion-summary">
            <div class="tools-platform-frame__summary-copy">
              <h1 class="tools-platform-frame__title" data-tool-id="workspace-v2">Workspace V2 Session Producer</h1>
              <h2 class="tools-platform-frame__eyebrow">Asset Manager V2 launch host</h2>
            </div>
            <div class="tools-platform-frame__summary-meta">
              <div class="tools-platform-frame__meta">Launches Asset Manager V2 with a Workspace V2 manifest context.</div>
            </div>
          </div>
        </div>
      </section>
    </header>

    <nav class="workspace-v2__menu" aria-label="Workspace V2 asset actions">
      <button id="workspaceV2OpenAssetManagerButton" type="button">Open Asset Manager V2</button>
      <button id="workspaceV2RefreshButton" type="button">Refresh Manifest</button>
    </nav>

    <main class="workspace-v2 app-shell" data-tool-id="workspace-v2">
      <section class="workspace-v2__panel" aria-label="Workspace manifest">
        <h2>Workspace Manifest</h2>
        <textarea id="workspaceManifestText" readonly rows="24" aria-label="Workspace V2 manifest JSON"></textarea>
      </section>

      <aside class="workspace-v2__panel" aria-label="Workspace status">
        <h2>Status</h2>
        <textarea id="workspaceStatusLog" readonly rows="12" aria-label="Workspace V2 status log"></textarea>
      </aside>
    </main>
    <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
  </body>
</html>
