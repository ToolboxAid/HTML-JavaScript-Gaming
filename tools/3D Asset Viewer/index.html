<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Asset Viewer</title>
  <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css" />
  <link rel="stylesheet" href="../shared/platformShell.css" />
  <link rel="stylesheet" href="../shared/debugInspectorTools.css" />
</head>
<body class="tools-platform-tool-page" data-tool-id="3d-asset-viewer" data-tools-platform-page="tool">
  <div data-tools-platform-header></div>
  <div class="debug-tool-shell app-shell">
    <section class="panel debug-tool-panel">
      <h2>3D Asset Viewer</h2>
      <p>Inspect baseline 3D asset payload metadata, vertex counts, and computed bounds.</p>
      <div class="debug-tool-actions">
        <button type="button" id="inspect3dAssetButton">Inspect Asset</button>
      </div>
      <div id="asset3dStatus" class="debug-tool-meta">3D asset viewer ready.</div>
    </section>

    <section class="debug-tool-grid">
      <section class="panel debug-tool-panel">
        <h3>Asset Input</h3>
        <textarea id="asset3dInput" rows="16"></textarea>
      </section>
      <section class="panel debug-tool-panel">
        <h3>Asset Inspection</h3>
        <pre id="asset3dOutput" class="debug-tool-readout">Inspect an asset payload to see normalized summary output.</pre>
      </section>
    </section>
  </div>
  <div data-tools-platform-status></div>
  <script type="module" src="../shared/platformShell.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
