<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Preview SVG Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      line-height: 1.4;
    }

    h1 {
      margin-top: 0;
    }

    .row {
      margin: 10px 0;
    }

    label {
      display: inline-block;
      min-width: 170px;
      vertical-align: top;
      font-weight: 600;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 700px;
      max-width: 100%;
      padding: 6px;
      box-sizing: border-box;
    }

    textarea {
      height: 220px;
      font-family: Consolas, monospace;
      font-size: 13px;
      white-space: pre;
    }

    button {
      padding: 8px 14px;
      margin-right: 8px;
      cursor: pointer;
    }

    #log {
      margin-top: 16px;
      border: 1px solid #ccc;
      padding: 12px;
      height: 320px;
      overflow: auto;
      white-space: pre-wrap;
      background: #fafafa;
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    #frame {
      width: 1280px;
      height: 800px;
      border: 1px solid #ddd;
      margin-top: 16px;
      display: none;
    }

    .note {
      color: #444;
      margin-top: 6px;
    }

    .inline {
      display: inline-block;
      margin-right: 16px;
    }

    .value-box {
      display: inline-block;
      min-width: 700px;
      max-width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      background: #f7f7f7;
      font-family: Consolas, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>

<body>
  <h1>Preview SVG Generator</h1>

  <div class="row">
    <label>Target type</label>
    <span class="inline">
      <input id="targetTypeSamples" type="radio" name="targetType" value="samples" checked />
      <label for="targetTypeSamples" style="min-width: 0; font-weight: normal;">Samples</label>
    </span>
    <span class="inline">
      <input id="targetTypeGames" type="radio" name="targetType" value="games" />
      <label for="targetTypeGames" style="min-width: 0; font-weight: normal;">Games</label>
    </span>
    <span class="inline">
      <input id="targetTypeTools" type="radio" name="targetType" value="tools" />
      <label for="targetTypeTools" style="min-width: 0; font-weight: normal;">Tools</label>
    </span>
  </div>

  <div class="row">
    <label for="baseUrl">Base URL</label>
    <input id="baseUrl" type="text" value="http://127.0.0.1:5500" />
  </div>

  <div class="row">
    <label for="waitMs">Wait before capture</label>
    <input id="waitMs" type="number" value="3500" min="3000" step="500" />
  </div>

  <div class="row">
    <label>Repo selected</label>
    <div id="repoSelectedValue" class="value-box">not selected</div>
  </div>

  <div class="row">
    <label for="assetFolder">Asset folder</label>
    <input id="assetFolder" type="text" value="assets/images" />
  </div>

  <div class="row">
    <label>Write folder as sample</label>
    <div id="writeFolderSampleValue" class="value-box">samples\phase-XX\XXXX\assets</div>
  </div>

  <div class="row">
    <label for="sampleList">Paths or IDs</label>
    <textarea id="sampleList" placeholder="Samples examples:
samples/phase-01/0102/index.html
samples/phase-13/1303/index.html
0107
1305

Games examples:
games/Bouncing-ball/index.html
Bouncing-ball

Tools examples:
tools/Vector Map Editor/index.html
Vector Map Editor"></textarea>
  </div>

  <div class="row">
    <label>Options</label>
    <span class="inline">
      <input id="forceRewrite" type="checkbox" />
      <label for="forceRewrite" style="min-width: 0; font-weight: normal;">Force rewrite</label>
    </span>
    <span class="inline">
      <input id="onlyCaptureTimeout" type="checkbox" checked />
      <label for="onlyCaptureTimeout" style="min-width: 0; font-weight: normal;">Only rewrite if preview.svg contains literal "Capture timeout"</label>
    </span>
  </div>

  <div class="row">
    <label>Capture mode</label>
    <span class="inline">
      <input id="captureModeFullScreen" type="radio" name="captureMode" value="fullscreen1600" />
      <label for="captureModeFullScreen" style="min-width: 0; font-weight: normal;">Full Screen (1600x900 HTML Page)</label>
    </span>
    <span class="inline">
      <input id="captureModeCanvasOnly" type="radio" name="captureMode" value="canvasOnly" checked />
      <label for="captureModeCanvasOnly" style="min-width: 0; font-weight: normal;">Canvas Only</label>
    </span>
  </div>

  <div class="row">
    <button id="pickRepoBtn">Pick Repo Folder</button>
    <button id="executeBtn" disabled>Execute</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <div id="status" class="row">Repo folder: not selected</div>

  <div class="note">
    Pick the repo root folder, for example <code>HTML-JavaScript-Gaming</code>.
  </div>

  <div class="row">
    <label>Write folder</label>
    <div id="writeFolderActualValue" class="value-box">not available yet</div>
  </div>

  <iframe id="frame" title="sample-loader"></iframe>

  <div id="log"></div>

  <script>
    const OUTPUT_NAME = "preview.svg";
    const CAPTURE_TIMEOUT_MARKER = "Capture timeout";

    const pickRepoBtn = document.getElementById("pickRepoBtn");
    const executeBtn = document.getElementById("executeBtn");
    const stopBtn = document.getElementById("stopBtn");
    const baseUrlInput = document.getElementById("baseUrl");
    const waitMsInput = document.getElementById("waitMs");
    const assetFolderInput = document.getElementById("assetFolder");
    const sampleListInput = document.getElementById("sampleList");
    const forceRewriteInput = document.getElementById("forceRewrite");
    const onlyCaptureTimeoutInput = document.getElementById("onlyCaptureTimeout");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const frame = document.getElementById("frame");

    const repoSelectedValueEl = document.getElementById("repoSelectedValue");
    const writeFolderSampleValueEl = document.getElementById("writeFolderSampleValue");
    const writeFolderActualValueEl = document.getElementById("writeFolderActualValue");

    const targetTypeInputs = Array.from(document.querySelectorAll('input[name="targetType"]'));
    const captureModeInputs = Array.from(document.querySelectorAll('input[name="captureMode"]'));
    const runtimeParams = new URLSearchParams(window.location.search);
    const isRuntimeMode = runtimeParams.get("mode") === "runtime";

    let repoDirHandle = null;
    let stopRequested = false;
    let repoDisplayName = "";

    function log(message = "") {
      const now = new Date().toLocaleTimeString();
      logEl.textContent += `[${now}] ${message}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      console.log(message);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getSelectedCaptureMode() {
      const selected = captureModeInputs.find(x => x.checked);
      return selected ? selected.value : "canvasOnly";
    }

    function getCaptureModeLabel(modeValue = getSelectedCaptureMode()) {
      return modeValue === "canvasOnly"
        ? "Canvas Only"
        : "Full Screen (1600x900 HTML Page)";
    }

    function initializeRuntimeCaptureMode() {
      const samplePath = String(runtimeParams.get("sample") || "").trim();
      const width = Math.max(1, Number(runtimeParams.get("w") || 640));
      const height = Math.max(1, Number(runtimeParams.get("h") || 360));
      const settleMs = Math.max(0, Number(runtimeParams.get("settle") || 3000));
      const timeoutMs = Math.max(1000, Number(runtimeParams.get("timeout") || 12000));
      const captureModeParam = String(runtimeParams.get("capture") || "canvasOnly").trim();
      const runtimeCaptureMode = captureModeParam === "fullscreen1600" ? "fullscreen1600" : "canvasOnly";

      function setStatus(status) {
        document.body.setAttribute("data-capture-status", status);
        document.title = "capture:" + status;
      }

      const bodyChildren = Array.from(document.body.children);
      for (const node of bodyChildren) {
        node.style.display = "none";
      }
      document.body.style.margin = "0";
      document.body.style.background = "#000";
      document.body.style.overflow = "hidden";

      frame.style.display = "block";
      frame.style.position = "fixed";
      frame.style.width = "1px";
      frame.style.height = "1px";
      frame.style.left = "-10000px";
      frame.style.top = "-10000px";
      frame.style.border = "0";
      frame.style.visibility = "hidden";
      frame.setAttribute("sandbox", "allow-scripts allow-same-origin");

      const outputCanvas = document.createElement("canvas");
      outputCanvas.id = "runtimeCaptureSurface";
      outputCanvas.width = width;
      outputCanvas.height = height;
      outputCanvas.style.display = "block";
      outputCanvas.style.width = "100vw";
      outputCanvas.style.height = "100vh";
      outputCanvas.style.background = "#000";
      document.body.appendChild(outputCanvas);

      const ctx = outputCanvas.getContext("2d");
      if (!ctx) {
        setStatus("error");
        return;
      }

      function writeLabel(text, color) {
        ctx.fillStyle = "#0b1020";
        ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = "#334e7a";
        ctx.lineWidth = 2;
        ctx.strokeRect(10, 10, width - 20, height - 20);
        ctx.fillStyle = color;
        ctx.font = "600 18px monospace";
        ctx.fillText(text, 20, 40);
      }

      function drawSourceCanvas(sourceCanvas) {
        const sw = sourceCanvas.width || sourceCanvas.clientWidth || width;
        const sh = sourceCanvas.height || sourceCanvas.clientHeight || height;
        if (!sw || !sh) {
          throw new Error("Canvas has invalid size.");
        }

        const scale = Math.max(width / sw, height / sh);
        const dw = sw * scale;
        const dh = sh * scale;
        const dx = (width - dw) * 0.5;
        const dy = (height - dh) * 0.5;

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(sourceCanvas, dx, dy, dw, dh);
      }

      function fail(message) {
        writeLabel(message, "#ff9ca8");
        setStatus("error");
      }

      if (!samplePath) {
        fail("Missing sample parameter");
        return;
      }

      writeLabel("Loading sample...", "#a5c0e6");
      setStatus("loading");

      const startTime = Date.now();
      let settled = false;

      async function captureFullScreenCanvas(frameDoc) {
        const html2canvasFn = window.html2canvas;
        if (typeof html2canvasFn !== "function") {
          return frameDoc.querySelector("canvas");
        }

        const frameBody = frameDoc.body;
        if (!frameBody) {
          return null;
        }

        return await html2canvasFn(frameBody, {
          backgroundColor: "#000000",
          useCORS: true,
          allowTaint: true,
          logging: false,
          width: 1600,
          height: 900,
          windowWidth: 1600,
          windowHeight: 900,
          scrollX: 0,
          scrollY: 0
        });
      }

      async function attemptCapture() {
        try {
          const frameDoc = frame.contentDocument;
          if (!frameDoc) {
            throw new Error("Frame document unavailable.");
          }

          let sourceCanvas;
          if (runtimeCaptureMode === "fullscreen1600") {
            sourceCanvas = await captureFullScreenCanvas(frameDoc);
          } else {
            sourceCanvas = frameDoc.querySelector("canvas");
          }

          if (!sourceCanvas) {
            if (Date.now() - startTime > timeoutMs) {
              fail("Canvas not found");
              return;
            }
            requestAnimationFrame(() => {
              attemptCapture();
            });
            return;
          }

          if (!settled) {
            settled = true;
            setTimeout(() => {
              attemptCapture();
            }, settleMs);
            return;
          }

          drawSourceCanvas(sourceCanvas);
          setStatus("ready");
        } catch (_) {
          if (Date.now() - startTime > timeoutMs) {
            fail("Capture timeout");
            return;
          }
          requestAnimationFrame(() => {
            attemptCapture();
          });
        }
      }

      frame.addEventListener("load", () => {
        requestAnimationFrame(() => {
          attemptCapture();
        });
      }, { once: true });

      frame.src = samplePath;

      setTimeout(() => {
        if (document.body.getAttribute("data-capture-status") !== "ready") {
          fail("Capture timeout");
        }
      }, timeoutMs + settleMs + 800);
    }

    function normalizeSlashes(value) {
      return String(value || "")
        .replaceAll("/", "\\")
        .replace(/\\{2,}/g, "\\");
    }

    function escapeXml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");
    }

    function getSelectedTargetType() {
      const selected = targetTypeInputs.find(x => x.checked);
      return selected ? selected.value : "samples";
    }

    function getAssetFolderRelativePath() {
      const raw = String(assetFolderInput.value || "").trim();
      if (!raw) return "assets";

      return raw
        .replaceAll("\\", "/")
        .replace(/^\/+|\/+$/g, "")
        .split("/")
        .map(x => x.trim())
        .filter(Boolean)
        .join("/");
    }

    function getAssetFolderDisplayPath() {
      return getAssetFolderRelativePath().replaceAll("/", "\\");
    }

    function getWriteFolderRelativePath(entry) {
      if (entry.targetType === "samples") {
        return `samples/phase-${entry.phase}/${entry.id}/${getAssetFolderRelativePath()}`;
      }
      if (entry.targetType === "games") {
        return `games/${entry.name}/${getAssetFolderRelativePath()}`;
      }
      if (entry.targetType === "tools") {
        return `tools/${entry.name}/${getAssetFolderRelativePath()}`;
      }
      throw new Error(`Unsupported target type: ${entry.targetType}`);
    }

    function getWriteFolderDisplayPath(entry) {
      return normalizeSlashes(getWriteFolderRelativePath(entry));
    }

    function getFullOutputPath(entry) {
      return `${getWriteFolderDisplayPath(entry)}\\${OUTPUT_NAME}`;
    }

    function updateWriteFolderSampleLabel() {
      const assetFolder = getAssetFolderDisplayPath() || "assets/images";
      const targetType = getSelectedTargetType();

      if (targetType === "samples") {
        writeFolderSampleValueEl.textContent = `samples\\phaseXX\\XXXX\\${assetFolder}`;
        return;
      }
      if (targetType === "games") {
        writeFolderSampleValueEl.textContent = `games\\Game Name\\${assetFolder}`;
        return;
      }
      if (targetType === "tools") {
        writeFolderSampleValueEl.textContent = `tools\\Tool Name\\${assetFolder}`;
      }
    }

    async function updateWriteFolderActualLabelFromInput() {
      const lines = parseInputList(sampleListInput.value);
      if (!lines.length) {
        writeFolderActualValueEl.textContent = "not available yet";
        return;
      }

      try {
        const entry = await resolveEntry(lines[0]);
        writeFolderActualValueEl.textContent = getWriteFolderDisplayPath(entry);
      } catch {
        writeFolderActualValueEl.textContent = "not available yet";
      }
    }

    async function updatePathPreviewLabels() {
      updateWriteFolderSampleLabel();
      await updateWriteFolderActualLabelFromInput();
    }

    async function getDirectoryHandle(parentHandle, name) {
      return await parentHandle.getDirectoryHandle(name);
    }

    async function getFileHandle(parentHandle, name, create = false) {
      return await parentHandle.getFileHandle(name, { create });
    }

    async function resolveSample(inputLine) {
      const raw = inputLine.trim();
      if (!raw) return null;
      const normalized = raw.replaceAll("\\", "/");

      const idOnlyMatch = normalized.match(/^(\d{4})$/);
      if (idOnlyMatch) {
        const id = idOnlyMatch[1];
        const phase = id.substring(0, 2);
        return {
          targetType: "samples",
          id,
          phase,
          samplePath: `samples/phase-${phase}/${id}/index.html`
        };
      }

      const pathMatch = normalized.match(/samples\/phase-?(\d{2})\/(\d{4})\/index\.html$/i);
      if (pathMatch) {
        return {
          targetType: "samples",
          id: pathMatch[2],
          phase: pathMatch[1],
          samplePath: `samples/phase-${pathMatch[1]}/${pathMatch[2]}/index.html`
        };
      }

      throw new Error(`Unrecognized sample input: ${raw}`);
    }

    async function resolveGame(inputLine) {
      const raw = inputLine.trim();
      if (!raw) return null;
      const normalized = raw.replaceAll("\\", "/").replace(/^\/+|\/+$/g, "");

      const pathMatch = normalized.match(/^games\/(.+)\/index\.html$/i);
      if (pathMatch) {
        return {
          targetType: "games",
          name: pathMatch[1],
          samplePath: `games/${pathMatch[1]}/index.html`
        };
      }

      return {
        targetType: "games",
        name: normalized,
        samplePath: `games/${normalized}/index.html`
      };
    }

    async function resolveTool(inputLine) {
      const raw = inputLine.trim();
      if (!raw) return null;
      const normalized = raw.replaceAll("\\", "/").replace(/^\/+|\/+$/g, "");

      const pathMatch = normalized.match(/^tools\/(.+)\/index\.html$/i);
      if (pathMatch) {
        return {
          targetType: "tools",
          name: pathMatch[1],
          samplePath: `tools/${pathMatch[1]}/index.html`
        };
      }

      return {
        targetType: "tools",
        name: normalized,
        samplePath: `tools/${normalized}/index.html`
      };
    }

    async function resolveEntry(inputLine) {
      const raw = String(inputLine || "").trim();
      if (!raw) return null;

      const normalized = raw.replaceAll("\\", "/").replace(/^\/+|\/+$/g, "");

      if (/^samples\//i.test(normalized)) {
        return await resolveSample(normalized);
      }
      if (/^games\//i.test(normalized)) {
        return await resolveGame(normalized);
      }
      if (/^tools\//i.test(normalized)) {
        return await resolveTool(normalized);
      }

      const targetType = getSelectedTargetType();
      if (targetType === "samples") return await resolveSample(raw);
      if (targetType === "games") return await resolveGame(raw);
      if (targetType === "tools") return await resolveTool(raw);

      throw new Error(`Unsupported target type: ${targetType}`);
    }

    async function getTargetDirHandle(repoHandle, entry) {
      if (entry.targetType === "samples") {
        const samplesDir = await getDirectoryHandle(repoHandle, "samples");
        const phaseDir = await getDirectoryHandle(samplesDir, `phase-${entry.phase}`);
        return await getDirectoryHandle(phaseDir, entry.id);
      }

      if (entry.targetType === "games") {
        const gamesDir = await getDirectoryHandle(repoHandle, "games");
        return await getExistingDirectoryPath(gamesDir, entry.name);
      }

      if (entry.targetType === "tools") {
        const toolsDir = await getDirectoryHandle(repoHandle, "tools");
        return await getExistingDirectoryPath(toolsDir, entry.name);
      }

      throw new Error(`Unsupported target type: ${entry.targetType}`);
    }

    async function ensureDirectoryPath(parentHandle, relativePath) {
      const parts = String(relativePath || "")
        .replaceAll("\\", "/")
        .split("/")
        .map(x => x.trim())
        .filter(Boolean);

      let current = parentHandle;
      for (const part of parts) {
        current = await current.getDirectoryHandle(part, { create: true });
      }
      return current;
    }

    async function getExistingDirectoryPath(parentHandle, relativePath) {
      const parts = String(relativePath || "")
        .replaceAll("\\", "/")
        .split("/")
        .map(x => x.trim())
        .filter(Boolean);

      let current = parentHandle;
      for (const part of parts) {
        current = await current.getDirectoryHandle(part);
      }
      return current;
    }

    async function readExistingPreview(targetDirHandle) {
      const relativeOutputFolder = getAssetFolderRelativePath();
      try {
        const targetDir = relativeOutputFolder
          ? await getExistingDirectoryPath(targetDirHandle, relativeOutputFolder)
          : targetDirHandle;

        const fileHandle = await getFileHandle(targetDir, OUTPUT_NAME, false);
        const file = await fileHandle.getFile();
        return await file.text();
      } catch {
        return null;
      }
    }

    async function shouldRewrite(targetDirHandle) {
      if (forceRewriteInput.checked) {
        return { rewrite: true, reason: "force-rewrite" };
      }

      const existing = await readExistingPreview(targetDirHandle);
      if (existing == null) {
        return { rewrite: true, reason: "missing-preview" };
      }

      if (onlyCaptureTimeoutInput.checked) {
        if (existing.includes(CAPTURE_TIMEOUT_MARKER)) {
          return { rewrite: true, reason: "literal-capture-timeout-found" };
        }
        return { rewrite: false, reason: "no-literal-capture-timeout" };
      }

      return { rewrite: true, reason: "rewrite-allowed" };
    }

    async function writePreview(targetDirHandle, svgContent) {
      const relativeOutputFolder = getAssetFolderRelativePath();

      const targetDir = relativeOutputFolder
        ? await ensureDirectoryPath(targetDirHandle, relativeOutputFolder)
        : targetDirHandle;

      const fileHandle = await getFileHandle(targetDir, OUTPUT_NAME, true);
      const writable = await fileHandle.createWritable();
      await writable.write(svgContent);
      await writable.close();
    }

    function buildFallbackSvg(message) {
      return `<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="80">
  <text x="10" y="24">${escapeXml(message)}</text>
</svg>`;
    }

    function buildCanvasWrappedSvg(canvas) {
      const width = canvas.width || canvas.scrollWidth || 800;
      const height = canvas.height || canvas.scrollHeight || 600;
      const dataUrl = canvas.toDataURL("image/png");
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
  <image href="${dataUrl}" width="100%" height="100%" />
</svg>`;
    }

    function buildElementWrappedSvg(element) {
      const rect = element.getBoundingClientRect();
      const width = Math.max(1, Math.ceil(rect.width || 1280));
      const height = Math.max(1, Math.ceil(rect.height || 800));
      const serialized = new XMLSerializer().serializeToString(element);
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">${serialized}</div>
  </foreignObject>
</svg>`;
    }

    async function waitForFrameLoad(iframe, timeoutMs = 20000) {
      return await new Promise((resolve, reject) => {
        let done = false;

        const timer = setTimeout(() => {
          if (!done) {
            done = true;
            reject(new Error(`iframe load timed out after ${timeoutMs}ms`));
          }
        }, timeoutMs);

        function onLoad() {
          if (!done) {
            done = true;
            clearTimeout(timer);
            iframe.removeEventListener("load", onLoad);
            resolve();
          }
        }

        iframe.addEventListener("load", onLoad, { once: true });
      });
    }

    function sanitizeClonedToolDocument(clonedDoc) {
      const all = clonedDoc.querySelectorAll("*");
      for (const el of all) {
        const style = el.style;
        if (!style) continue;
        const bg = style.backgroundImage || "";
        if (/gradient/i.test(bg)) {
          style.backgroundImage = "none";
        }
      }

      const canvases = clonedDoc.querySelectorAll("canvas");
      for (const canvas of canvases) {
        try {
          const img = clonedDoc.createElement("img");
          img.src = canvas.toDataURL("image/png");
          img.style.width = canvas.style.width || `${canvas.width}px`;
          img.style.height = canvas.style.height || `${canvas.height}px`;
          img.style.display = "block";
          canvas.replaceWith(img);
        } catch {
        }
      }
    }

    function extractBestToolFallbackSvg(doc) {
      const preferredSelectors = [
        "main canvas",
        ".editor canvas",
        ".workspace canvas",
        "#editor canvas",
        "canvas",
        "main",
        ".editor",
        ".workspace",
        "#editor",
        "body"
      ];

      for (const selector of preferredSelectors) {
        const el = doc.querySelector(selector);
        if (!el) continue;

        if ((el.tagName || "").toLowerCase() === "canvas") {
          return buildCanvasWrappedSvg(el);
        }

        try {
          return buildElementWrappedSvg(el);
        } catch {
        }
      }

      return buildFallbackSvg(CAPTURE_TIMEOUT_MARKER);
    }

    async function extractFullPageSvg1600(doc) {
      const win = frame.contentWindow;
      if (!win) {
        return buildFallbackSvg(CAPTURE_TIMEOUT_MARKER);
      }

      const html2canvasFn = window.html2canvas || win.html2canvas;
      if (typeof html2canvasFn !== "function") {
        return extractBestToolFallbackSvg(doc);
      }

      const body = doc.body;
      const fullWidth = 1600;
      const fullHeight = 900;

      try {
        const canvas = await html2canvasFn(body, {
          backgroundColor: "#ffffff",
          useCORS: true,
          allowTaint: true,
          logging: false,
          width: fullWidth,
          height: fullHeight,
          windowWidth: fullWidth,
          windowHeight: fullHeight,
          scrollX: 0,
          scrollY: 0,
          onclone: (clonedDoc) => {
            sanitizeClonedToolDocument(clonedDoc);
          }
        });

        return buildCanvasWrappedSvg(canvas);
      } catch (error) {
        log(`WARN tool full-page capture failed, using fallback (${error.message})`);
        return extractBestToolFallbackSvg(doc);
      }
    }

    function extractCanvasOnlySvg(doc) {
      const canvas = doc.querySelector("canvas");
      if (canvas) {
        return buildCanvasWrappedSvg(canvas);
      }
      return buildFallbackSvg("Canvas not found");
    }

    async function extractSvgFromFrame(entry) {
      const doc = frame.contentDocument;
      if (!doc) {
        return buildFallbackSvg(CAPTURE_TIMEOUT_MARKER);
      }

      if (getSelectedCaptureMode() === "canvasOnly") {
        return extractCanvasOnlySvg(doc);
      }

      return await extractFullPageSvg1600(doc);
    }

    async function triggerGameStart() {
      try {
        const win = frame.contentWindow;
        if (!win) return;

        const evtDown = new KeyboardEvent("keydown", { key: "Enter", code: "Enter", keyCode: 13, which: 13, bubbles: true });
        const evtUp = new KeyboardEvent("keyup", { key: "Enter", code: "Enter", keyCode: 13, which: 13, bubbles: true });

        win.document.dispatchEvent(evtDown);
        win.document.dispatchEvent(evtUp);
      } catch {}
    }

    async function processOne(entry, baseUrl, waitMs) {
      const targetDirHandle = await getTargetDirHandle(repoDirHandle, entry);
      const decision = await shouldRewrite(targetDirHandle);

      writeFolderActualValueEl.textContent = getWriteFolderDisplayPath(entry);
      const label = entry.targetType === "samples" ? entry.id : entry.name;

      if (!decision.rewrite) {
        log(`SKIP ${label}  (${decision.reason})`);
        log(`CHK  ${getFullOutputPath(entry)}`);
        return { id: label, status: "skipped", reason: decision.reason };
      }

      const url = `${baseUrl}/${entry.samplePath}`;
      log(`RUN  ${label}`);
      log(`OUT  ${getFullOutputPath(entry)}`);
      log(`URL  ${url}`);

      try {
        frame.src = url;
        await waitForFrameLoad(frame, 20000);
        if (entry.targetType === "games") {
          await triggerGameStart();
          await sleep(3000);
        } else {
          await sleep(waitMs);
        }

        const svgContent = await extractSvgFromFrame(entry);
        await writePreview(targetDirHandle, svgContent);

        const stillHasTimeout = svgContent.includes(CAPTURE_TIMEOUT_MARKER);
        if (stillHasTimeout) {
          log(`WARN ${label}  (saved but still contains Capture timeout)`);
          log("");
          return { id: label, status: "warning", reason: "still-has-capture-timeout" };
        }

        log(`OK   ${label}`);
        log("");
        return { id: label, status: "written", reason: decision.reason };
      } catch (error) {
        const fallback = buildFallbackSvg(`${CAPTURE_TIMEOUT_MARKER}: ${error.message}`);
        await writePreview(targetDirHandle, fallback);
        log(`FAIL ${label}  (${error.message})`);
        log("");
        return { id: label, status: "failed", reason: error.message };
      }
    }

    function parseInputList(text) {
      const lines = text
        .split(/\r?\n/)
        .map(x => x.trim())
        .filter(Boolean);

      const unique = [];
      const seen = new Set();

      for (const line of lines) {
        const key = line.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(line);
        }
      }

      return unique;
    }

    function printSummary(results) {
      const skipped = results.filter(x => x.status === "skipped");
      const written = results.filter(x => x.status === "written");
      const warnings = results.filter(x => x.status === "warning");
      const failed = results.filter(x => x.status === "failed");

      log("===== SUMMARY =====");
      log(`Written: ${written.length}`);
      if (written.length) {
        log(written.map(x => x.id).join(","));
      }

      log(`Warnings: ${warnings.length}`);
      if (warnings.length) {
        log(warnings.map(x => `${x.id}(${x.reason})`).join(","));
      }

      log(`Failed: ${failed.length}`);
      if (failed.length) {
        log(failed.map(x => `${x.id}(${x.reason})`).join(","));
      }

      const groupedSkips = {};
      for (const item of skipped) {
        groupedSkips[item.reason] = groupedSkips[item.reason] || [];
        groupedSkips[item.reason].push(item.id);
      }

      const reasons = Object.keys(groupedSkips);
      log(`Skipped: ${skipped.length}`);
      for (const reason of reasons) {
        log(`Skipped (${reason}):`);
        log(groupedSkips[reason].join(","));
      }

      log("===================");
    }

    if (isRuntimeMode) {
      initializeRuntimeCaptureMode();
    } else {
      pickRepoBtn.addEventListener("click", async () => {
        try {
          repoDirHandle = await window.showDirectoryPicker({ mode: "readwrite" });
          repoDisplayName = repoDirHandle.name || "selected folder";

          repoSelectedValueEl.textContent = repoDisplayName;
          statusEl.textContent = `Repo folder: ${repoDisplayName}`;
          executeBtn.disabled = false;

          await updatePathPreviewLabels();
          log(`Repo selected: ${repoDisplayName}`);
        } catch (error) {
          log(`Repo folder selection canceled or failed: ${error.message}`);
        }
      });

      executeBtn.addEventListener("click", async () => {
        if (!repoDirHandle) {
          log("Pick the repo folder first.");
          return;
        }

        const lines = parseInputList(sampleListInput.value);
        if (!lines.length) {
          log("Paste at least one path or ID.");
          return;
        }

        const baseUrl = baseUrlInput.value.trim().replace(/\/+$/, "");
        const waitMs = Math.max(3000, Number(waitMsInput.value) || 3500);
        const targetType = getSelectedTargetType();

        stopRequested = false;
        executeBtn.disabled = true;
        stopBtn.disabled = false;
        log("");
        log("Starting execution...");
        log(`Target type: ${targetType}`);
        log(`Base URL: ${baseUrl}`);
        log(`Wait: ${waitMs}ms`);
        log(`Repo selected: ${repoDisplayName || "not selected"}`);
        log(`Asset folder: ${getAssetFolderDisplayPath()}`);
        log(`Capture mode: ${getCaptureModeLabel()}`);
        log(`Force rewrite: ${forceRewriteInput.checked}`);
        log(`Only literal Capture timeout: ${onlyCaptureTimeoutInput.checked}`);
        log("");

        const results = [];

        try {
          for (const line of lines) {
            if (stopRequested) {
              log("Stop requested. Ending run.");
              break;
            }

            try {
              const entry = await resolveEntry(line);
              if (!entry) continue;
              const result = await processOne(entry, baseUrl, waitMs);
              results.push(result);
            } catch (error) {
              log(`FAIL INPUT  ${line}  (${error.message})`);
              log("");
              results.push({ id: line, status: "failed", reason: error.message });
            }
          }

          printSummary(results);
        } catch (error) {
          log(`Unexpected error: ${error.message}`);
        } finally {
          executeBtn.disabled = false;
          stopBtn.disabled = true;
          log("Done.");
        }
      });

      stopBtn.addEventListener("click", () => {
        stopRequested = true;
        log("Stop requested. Will stop after current item.");
      });

      captureModeInputs.forEach(input => {
        input.addEventListener("change", () => {
          log(`Capture mode: ${getCaptureModeLabel()}`);
        });
      });

      assetFolderInput.addEventListener("input", () => {
        updatePathPreviewLabels();
      });

      sampleListInput.addEventListener("input", () => {
        updatePathPreviewLabels();
      });

      targetTypeInputs.forEach(input => {
        input.addEventListener("change", () => {
          updatePathPreviewLabels();
        });
      });

      updatePathPreviewLabels();
    }
  </script>
</body>

</html>
