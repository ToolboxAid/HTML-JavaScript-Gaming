<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview Generator V2</title>
  <link rel="stylesheet" href="../../src/engine/theme/main.css" />
  <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css" />
  <link rel="stylesheet" href="../../src/engine/theme/accordionV2/accordionV2.css" />
  <link rel="stylesheet" href="./previewGeneratorV2.css" />
</head>
<body class="tools-platform-tool-page hub-page-tools" data-tool-id="preview-generator-v2">
  <details class="is-collapsible" open>
    <summary class="is-collapsible__summary" data-preview-generator-v2-summary></summary>
    <div class="is-collapsible__content">
      <div id="shared-theme-header"></div>
      <div data-preview-generator-v2-header></div>
    </div>
  </details>

  <nav class="preview-generator-v2__menu-sample" aria-label="menuSample">
    <div class="preview-generator-v2__menu-actions">
      <button id="generatePreviewButton" type="button" disabled>Generate Preview</button>
      <button id="applyToGameButton" type="button" disabled>Apply to Game</button>
      <button id="exportImageButton" type="button" disabled>Export Image</button>
    </div>
  </nav>

  <div class="preview-generator-v2 app-shell">
    <div class="preview-generator-v2__layout tools-platform-layout-grid">
      <aside class="preview-generator-v2__panel preview-generator-v2__panel--left tools-platform-resize-panel" data-panel-side="left">
        <section class="accordion-v2 is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="previewTargetAccordionContent">
            <span>Target Source</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="previewTargetAccordionContent" class="accordion-v2__content">
            <fieldset id="previewTargetModeGroup" class="preview-generator-v2__radio-group">
              <legend>Target mode</legend>
              <label>
                <input id="previewTargetModeSample" type="radio" name="previewTarget" value="sample" />
                Sample
              </label>
              <label>
                <input id="previewTargetModeGame" type="radio" name="previewTarget" value="game" />
                Game
              </label>
              <label>
                <input id="previewTargetModeTool" type="radio" name="previewTarget" value="tool" />
                Tool
              </label>
            </fieldset>

            <label class="preview-generator-v2__field">
              Target name or path
              <input id="previewTargetInput" type="text" autocomplete="off" placeholder="Choose a mode first" />
            </label>

            <label class="preview-generator-v2__field">
              Source URL
              <input id="previewSourceUrlInput" type="url" autocomplete="off" placeholder="Optional inspected page URL" />
            </label>
          </div>
        </section>

        <section class="accordion-v2 is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="previewStatusAccordionContent">
            <span>Status</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="previewStatusAccordionContent" class="accordion-v2__content">
            <div id="previewStatus" class="preview-generator-v2__status" role="status">Select a target mode to begin.</div>
            <ul id="previewErrorList" class="preview-generator-v2__errors" aria-label="Preview validation errors"></ul>
          </div>
        </section>
      </aside>

      <main class="preview-generator-v2__panel preview-generator-v2__panel--center">
        <section class="accordion-v2 preview-generator-v2__main-preview is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="mainPreviewAccordionContent">
            <span>Main Preview</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="mainPreviewAccordionContent" class="accordion-v2__content">
            <div id="previewViewport" class="preview-generator-v2__viewport">
              <canvas id="previewCanvas" class="preview-generator-v2__canvas" width="960" height="540" aria-label="Generated preview canvas"></canvas>
              <div id="previewEmptyState" class="preview-generator-v2__empty-state">No preview generated.</div>
            </div>
          </div>
        </section>

        <section id="lastGeneratedPreviewSection" class="accordion-v2 preview-generator-v2__last-generated is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="lastGeneratedPreviewAccordionContent">
            <span>Last Generated Preview</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="lastGeneratedPreviewAccordionContent" class="accordion-v2__content">
            <figure class="preview-generator-v2__last-generated-frame">
              <img id="lastGeneratedPreviewImage" alt="Last generated preview" />
              <figcaption id="lastGeneratedPreviewMeta">No generated preview.</figcaption>
            </figure>
          </div>
        </section>
      </main>

      <aside class="preview-generator-v2__panel preview-generator-v2__panel--right tools-platform-resize-panel" data-panel-side="right">
        <section class="accordion-v2 is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="renderControlsAccordionContent">
            <span>Render Controls</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="renderControlsAccordionContent" class="accordion-v2__content">
            <fieldset class="preview-generator-v2__radio-group">
              <legend>Preview mode</legend>
              <label>
                <input id="previewModeCanvas" type="radio" name="previewMode" value="canvas" checked />
                Canvas
              </label>
              <label>
                <input id="previewModeWide" type="radio" name="previewMode" value="wide" />
                Wide
              </label>
            </fieldset>

            <label class="preview-generator-v2__field">
              Output file
              <input id="previewOutputNameInput" type="text" value="preview.svg" autocomplete="off" />
            </label>
          </div>
        </section>

        <section class="accordion-v2 is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="gameDestinationAccordionContent">
            <span>Game Destination</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="gameDestinationAccordionContent" class="accordion-v2__content">
            <p class="preview-generator-v2__meta">Game mode requires valid destination data before rendering.</p>
            <button id="loadDestinationDataButton" type="button">Load Destination Data</button>
            <input id="destinationDataInput" type="file" accept=".json,application/json" hidden />
            <div id="destinationDataStatus" class="preview-generator-v2__status">No destination data loaded.</div>
          </div>
        </section>

        <section class="accordion-v2 is-open" data-accordion-v2-open="true">
          <button class="accordion-v2__header" type="button" aria-expanded="true" aria-controls="outputSummaryAccordionContent">
            <span>Output Summary</span>
            <span class="accordion-v2__icon" aria-hidden="true">+</span>
          </button>
          <div id="outputSummaryAccordionContent" class="accordion-v2__content">
            <dl id="previewOutputSummary" class="preview-generator-v2__summary">
              <dt>Mode</dt>
              <dd id="previewSummaryMode">Not selected</dd>
              <dt>Destination</dt>
              <dd id="previewSummaryDestination">Not ready</dd>
              <dt>Image</dt>
              <dd id="previewSummaryImage">Not generated</dd>
            </dl>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <div data-preview-generator-v2-status></div>
  <script type="module" src="./previewGeneratorShell.js"></script>
  <script type="module" src="../../src/engine/theme/accordionV2/accordionV2.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
</body>
</html>
