<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palette Manager V2</title>
  <link rel="stylesheet" href="../../src/engine/theme/main.css" />
  <link rel="stylesheet" href="../../src/engine/ui/hubCommon.css" />
</head>
<body class="hub-page-home hub-page-home--viewport" data-tool-id="palette-manager-v2">
  <div id="shared-theme-header"></div>
  <main class="page-shell">
    <section class="content-section">
      <details class="is-collapsible" open>
        <summary class="is-collapsible__summary">Palette Manager V2 Session</summary>
        <div class="is-collapsible__content">
          <p id="paletteManagerSessionReadout" class="palette-manager-v2-readout">Waiting for session context.</p>
          <div class="palette-manager-v2-grid">
            <aside class="palette-manager-v2-panel" data-menu-tool>
              <h3>menuTool</h3>
              <p id="paletteManagerContractReadout" class="palette-manager-v2-readout">paletteJson not loaded.</p>
            </aside>
            <section class="palette-manager-v2-panel" aria-live="polite">
              <h3 id="paletteManagerName">No palette loaded</h3>
              <span id="paletteManagerCount" class="badge palette-manager-v2-count">0 colors</span>
              <div id="paletteManagerState" class="palette-manager-v2-state">No palette session data found. Open Palette Manager V2 with a valid hostContextId session.</div>
              <div id="paletteManagerSwatches" class="palette-manager-v2-swatches" aria-label="Palette Manager V2 swatches"></div>
            </section>
            <aside class="palette-manager-v2-panel" data-menu-workspace>
              <h3>menuWorkspace</h3>
              <p id="paletteManagerWorkspaceReadout" class="palette-manager-v2-readout">Workspace actions are read-only in this isolated V2 entry.</p>
            </aside>
          </div>
        </div>
      </details>
    </section>
  </main>
  <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
  <script type="module" src="./index.js"></script>
</body>
</html>
