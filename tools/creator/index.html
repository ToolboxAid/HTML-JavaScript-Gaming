<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tool Creator - Game Foundry Studio</title>
    <meta name="description" content="Game Foundry Studio Tool Creator layout.">
    <link rel="icon" href="../../assets/theme/v2/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../../src/engine/theme/v2/assets/css/styles.css">
</head>

<body class="meaning-molten-orange">
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Tool Layout</div>
                <h1>Tool Creator</h1>
                <p class="lede">Three-column tool page with left, center, and right accordion regions ready for future
                    Game Foundry Studio tools.</p>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div class="tool-workspace">
                    <aside class="tool-column tool-group-build-create">
                        <div class="tool-column-header molten-orange">
                            <h2>Toolbox</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Setup</summary>
                                <div class="accordion-body">Tool Creator setup wireframe.</div>
                            </details>
                        </div>
                    </aside>
                    <section class="tool-center-panel"><img src="../../assets/theme/v2/images/forge-bot-single.png" alt="ForgeBot">
                        <h2>Workspace</h2>
                        <p>Tool Creator</p>
                    </section>
                    <aside class="tool-column tool-group-build-create">
                        <div class="tool-column-header forge-gold">
                            <h2>Inspector</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Output</summary>
                                <div class="accordion-body">Tool Creator output wireframe.</div>
                            </details>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../../src/engine/theme/v2/assets/js/gamefoundry-partials.js" defer></script>
    <script src="../../src/engine/theme/v2/assets/js/tool-display-mode.js" defer></script>
</body>

</html>
