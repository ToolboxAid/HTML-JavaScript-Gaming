<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toolbox - Game Foundry Studio</title>
    <meta name="description" content="Game Foundry Studio creator toolbox.">
    <link rel="icon" href="../assets/theme/v2/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/theme/v2/css/theme/v2/theme.css">
</head>

<body>
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">The Toolbox</div>
                <h1>Creator tools organized by build surface.</h1>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div class="hero-actions" aria-label="Tool accordion sorting">
                    <button class="btn" type="button" data-tools-order="ascending" aria-pressed="true">Order A-Z</button>
                    <button class="btn" type="button" data-tools-sort="grouped" aria-pressed="false">Grouped</button>
                </div>
                <div class="accordion-group" data-tools-accordion-list></div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/theme/v2/js/gamefoundry-partials.js" defer></script>
    <script src="tools-page-accordions.js" defer></script>
</body>

</html>
