<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sprite Editor v1.1</title>
  <link rel="stylesheet" href="../../engine/ui/baseLayout.css" />
  <link rel="stylesheet" href="./spriteEditor.css" />
</head>
<body>
  <main class="editor-shell">
    <h1>Sprite Editor v1.1</h1>
    <p class="subtitle">Rebuilt multi-frame editor with animation preview.</p>

    <section class="panel controls">
      <h2>Frame Controls</h2>
      <div class="row">
        <button id="prevFrame" type="button">Prev</button>
        <button id="nextFrame" type="button">Next</button>
        <button id="addFrame" type="button">Add</button>
        <button id="dupFrame" type="button">Duplicate</button>
        <button id="delFrame" type="button">Delete</button>
      </div>
      <div class="row">
        <label for="fpsInput">FPS</label>
        <input id="fpsInput" type="number" min="1" max="60" value="8" />
        <label><input id="loopToggle" type="checkbox" checked /> Loop</label>
        <button id="playPreview" type="button">Play</button>
        <button id="pausePreview" type="button">Pause</button>
      </div>
      <div id="statusLine" class="status">Ready.</div>
    </section>

    <section class="panel workspace">
      <div class="column">
        <h2>Editor Grid</h2>
        <canvas id="editorCanvas" width="256" height="256"></canvas>
      </div>
      <div class="column">
        <h2>Preview</h2>
        <canvas id="previewCanvas" width="256" height="256"></canvas>
      </div>
    </section>

    <section class="panel">
      <h2>Frames</h2>
      <div id="frameStrip" class="frame-strip"></div>
    </section>

    <section class="panel io">
      <h2>Import / Export</h2>
      <div class="row">
        <button id="exportJson" type="button">Export JSON</button>
        <button id="importJson" type="button">Import JSON</button>
        <button id="saveLocal" type="button">Save Local</button>
        <button id="loadLocal" type="button">Load Local</button>
      </div>
      <textarea id="jsonArea" rows="10" spellcheck="false"></textarea>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
