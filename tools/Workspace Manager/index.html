<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workspace Manager</title>
  <link rel="stylesheet" href="./toolHost.css" />
</head>
<body class="tool-host-page">
  <header class="tool-host-shell">
    <div class="tool-host-shell__controls">
      <label class="tool-host-shell__field" for="tool-host-select">Tool</label>
      <select id="tool-host-select" data-tool-host-select aria-label="Tool to mount"></select>
      <button type="button" data-tool-host-prev>Prev</button>
      <button type="button" data-tool-host-next>Next</button>
      <button type="button" data-tool-host-mount>Mount</button>
      <button type="button" data-tool-host-unmount>Unmount</button>
      <a data-tool-host-standalone href="#" class="is-disabled" aria-disabled="true" tabindex="-1">Open Standalone</a>
    </div>
    <textarea data-tool-host-state-input class="tool-host-shell__state" rows="3" placeholder="Optional JSON state for mounted tool"></textarea>
    <p data-tool-host-current-label class="tool-host-shell__meta">No tool mounted.</p>
    <p data-tool-host-switch-meta class="tool-host-shell__meta"></p>
    <p data-tool-host-status class="tool-host-shell__status">Workspace Manager ready.</p>
    <section data-tool-host-diagnostic class="tool-host-shell__diagnostic" hidden>
      <h2>Workspace Manager Diagnostic</h2>
      <pre data-tool-host-diagnostic-text></pre>
    </section>
  </header>
  <main class="tool-host-workspace">
    <div data-tool-host-mount-container class="tool-host-workspace__mount"></div>
  </main>
  <script type="module">
    import("./main.js").catch((error) => {
      const panel = document.querySelector("[data-tool-host-diagnostic]");
      const textNode = document.querySelector("[data-tool-host-diagnostic-text]");
      const message = error instanceof Error ? `${error.name}: ${error.message}` : String(error || "Unknown module load error.");
      if (panel instanceof HTMLElement) {
        panel.hidden = false;
      }
      if (textNode instanceof HTMLElement) {
        textNode.textContent = `Workspace Manager boot import failed.\n${message}`;
      }
    });
  </script>
</body>
</html>
