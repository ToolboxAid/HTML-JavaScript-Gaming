<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asteroids</title>
  <link rel="stylesheet" href="../../samples/_shared/sampleLayout.css" />
</head>
<body>
  <main>
    <h1>Asteroids</h1>
    <p>Playable Asteroids-style arcade game with ship thrust, wraparound movement, asteroid splitting, and scoring.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <p>`Left/Right` rotate, `Up` thrust, `Space` fire, `Enter` restart after game over.</p>
    </section>
    <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>InputService</li>
        <li>Theme</li>
        <li>Scene</li>
      </ul>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
