<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Space Invaders Preview Capture</title>
  <style>
    html, body {
      margin: 0;
      background: #000;
    }

    canvas {
      display: block;
      width: 960px;
      height: 720px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="960" height="720"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function drawInvader(x, y, color, scale = 1) {
      const s = scale;
      ctx.fillStyle = color;
      [
        [1, 0, 4, 1],
        [0, 1, 6, 1],
        [1, 2, 1, 1],
        [4, 2, 1, 1],
        [0.5, 3, 2, 1],
        [3.5, 3, 2, 1],
        [1, 4, 1, 1],
        [4, 4, 1, 1],
      ].forEach(([px, py, w, h]) => {
        ctx.fillRect(x + (px * 8 * s), y + (py * 8 * s), w * 8 * s, h * 8 * s);
      });
    }

    function drawSquid(x, y, color, scale = 1) {
      const s = scale;
      ctx.fillStyle = color;
      [
        [1, 0, 1, 1],
        [3, 0, 1, 1],
        [0, 1, 5, 1],
        [1, 2, 3, 1],
        [0, 3, 1, 1],
        [4, 3, 1, 1],
        [1, 4, 1, 1],
        [3, 4, 1, 1],
      ].forEach(([px, py, w, h]) => {
        ctx.fillRect(x + (px * 8 * s), y + (py * 8 * s), w * 8 * s, h * 8 * s);
      });
    }

    function drawShield(x, y) {
      ctx.fillStyle = '#7CFF6B';
      ctx.beginPath();
      ctx.moveTo(x, y + 34);
      ctx.lineTo(x + 6, y + 10);
      ctx.lineTo(x + 20, y);
      ctx.lineTo(x + 62, y);
      ctx.lineTo(x + 76, y + 10);
      ctx.lineTo(x + 82, y + 34);
      ctx.lineTo(x + 66, y + 34);
      ctx.lineTo(x + 56, y + 20);
      ctx.lineTo(x + 44, y + 20);
      ctx.lineTo(x + 38, y + 34);
      ctx.closePath();
      ctx.fill();

      ctx.clearRect(x + 28, y + 20, 10, 18);
      ctx.clearRect(x + 48, y + 20, 10, 18);
      ctx.clearRect(x + 10, y + 24, 10, 8);
      ctx.clearRect(x + 64, y + 12, 8, 10);
    }

    function drawShip(x, y) {
      ctx.fillStyle = '#F8FAFC';
      ctx.fillRect(x + 20, y, 20, 12);
      ctx.fillRect(x + 10, y + 12, 40, 10);
      ctx.fillRect(x, y + 22, 60, 10);
      ctx.fillRect(x + 6, y + 32, 12, 8);
      ctx.fillRect(x + 42, y + 32, 12, 8);
    }

    const bg = ctx.createLinearGradient(0, 0, 0, 720);
    bg.addColorStop(0, '#02030A');
    bg.addColorStop(0.65, '#09131F');
    bg.addColorStop(1, '#0E1E14');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 960, 720);

    const frame = ctx.createLinearGradient(0, 24, 0, 696);
    frame.addColorStop(0, 'rgba(8, 19, 28, 0.96)');
    frame.addColorStop(1, 'rgba(4, 8, 13, 0.96)');
    ctx.fillStyle = frame;
    ctx.strokeStyle = '#D9FFE1';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(30, 26, 900, 668, 24);
    ctx.fill();
    ctx.stroke();

    ctx.strokeStyle = '#6DFF8A';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(62, 106, 836, 542, 18);
    ctx.stroke();

    ctx.fillStyle = '#F8FAFC';
    ctx.font = '26px monospace';
    ctx.fillText('SCORE<1> 0280', 74, 72);
    ctx.textAlign = 'center';
    ctx.fillText('HI-SCORE 1020', 480, 72);
    ctx.textAlign = 'right';
    ctx.fillText('WAVE 04', 886, 72);
    ctx.textAlign = 'start';

    ctx.fillStyle = '#FF5F5F';
    ctx.fillRect(92, 120, 42, 8);
    ctx.fillRect(82, 128, 62, 12);
    ctx.fillRect(74, 140, 78, 10);
    ctx.fillRect(94, 150, 10, 8);
    ctx.fillRect(122, 150, 10, 8);

    const green = '#7EFF8A';
    [174, 288, 402, 516, 630].forEach((x) => drawInvader(x, 186, green, 1));
    [192, 306, 420, 534, 648].forEach((x) => drawSquid(x, 264, green, 1));

    drawShield(200, 508);
    drawShield(394, 508);
    drawShield(588, 508);

    drawShip(450, 558);
    ctx.fillStyle = '#F8FAFC';
    ctx.fillRect(476, 522, 8, 42);

    ctx.fillStyle = '#FFCF5A';
    ctx.fillRect(702, 340, 6, 22);
    ctx.fillRect(250, 388, 6, 20);

    ctx.fillStyle = '#7EFF8A';
    ctx.fillRect(60, 626, 840, 4);

    ctx.fillStyle = '#F8FAFC';
    ctx.font = '24px monospace';
    ctx.fillText('CREDIT 00', 76, 668);
    ctx.textAlign = 'right';
    ctx.fillText('LIVES 3', 886, 668);
  </script>
</body>
</html>
