<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In - Game Foundry Studio LLC</title>
    <meta name="description" content="Sign in to your Game Foundry Studio LLC account.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../assets/theme-v2/css/theme.css">
</head>

<body>
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Account</div>
                <h1>Sign In</h1>
                <p class="lede">Access your Game Foundry Studio LLC account.</p>
            </div>
        </section>
        <section class="section">
            <div class="container content-stack">
                <div class="card">
                    <div class="card-body content-stack">
                        <div>
                            <div class="kicker">Secure Access</div>
                            <h2>Welcome Back</h2>
                        </div>
                        <form class="content-stack" data-login-form>
                            <label for="signInIdentity">Email</label>
                            <input id="signInIdentity" name="identity" type="email" autocomplete="email" data-login-identity>
                            <label for="signInPassword">Password</label>
                            <input id="signInPassword" name="password" type="password" autocomplete="current-password" data-login-password>
                            <div class="action-group">
                                <button class="btn primary" type="submit" data-login-submit>Sign In</button>
                                <a class="btn" href="create-account.html" data-login-create-account>Create Account</a>
                                <a class="btn btn--compact" href="password-reset.html" data-login-lost-password>Password Reset</a>
                            </div>
                            <div class="status" role="status" data-login-status>Sign In is not available in this preview. You can continue browsing.</div>
                        </form>
                        <div class="action-group">
                            <a class="btn btn--compact" href="toolbox/index.html" data-login-continue>Continue Browsing</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script type="module" src="../assets/theme-v2/js/login-session.js"></script>
</body>

</html>
