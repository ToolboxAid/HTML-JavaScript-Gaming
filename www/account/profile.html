<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - Game Foundry Studio</title>
    <meta name="description" content="Plan profile settings for Game Foundry Studio accounts.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../assets/theme-v2/css/theme.css">
</head>

<body>
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Account</div>
                <h1>Profile</h1>
                <p class="lede">A planning page for creator identity and public profile settings.</p>
            </div>
        </section>
        <section class="section">
            <div class="container account-panel">
                <div data-partial="account-side-nav" data-partial-replace></div>
                <div class="card" data-account-page="profile">
                    <div class="card-body content-stack">
                        <div>
                            <div class="kicker">Account Service</div>
                            <h2>Profile Identity</h2>
                        </div>
                        <p class="status" role="status" data-account-status>Loading profile identity.</p>
                        <div class="content-stack" data-account-content></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script type="module" src="../assets/theme-v2/js/account-page-data.js"></script>
</body>

</html>
