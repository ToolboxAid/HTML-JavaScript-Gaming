<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Custom Extensions - GameFoundryStudio</title>
    <meta name="description" content="GameFoundryStudio: Build. Play. Share.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../../assets/theme-v2/css/theme.css">
</head>

<body class="meaning-molten-orange">
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Foundry Bot</div>
                <h1>Custom Extensions</h1>
                <p class="lede">Register approved Engine V2 extension hooks and creator-private custom logic.</p>
            </div>
        </section>
        <section class="section">
            <div class="container container--tool-wide">
                <div class="tool-workspace tool-workspace--wide">
                    <aside class="tool-column tool-group-build">
                        <div class="tool-column-header">
                            <h2>Toolbox</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Setup</summary>
                                <div class="accordion-body"><p class="status" role="status">Not implemented yet.</p></div>
                            </details>
                        </div>
                    </aside>
                    <div data-tool-display-mode data-asset-root="../../assets/theme-v2/images" data-tool-slug="code" data-tool-icon-src="../../assets/theme-v2/images/badges/index.png" data-tool-character-src="../../assets/theme-v2/images/characters/index.png"></div>
                    <section class="tool-center-panel"><img src="../../assets/theme-v2/images/mascots/forge-bot-single.png" alt="ForgeBot">
                        <h2>Workspace</h2>
                        <p>Custom Extensions: Register approved Engine V2 extension hooks and creator-private custom logic.</p>
                    </section>
                    <aside class="tool-column tool-group-build">
                        <div class="tool-column-header">
                            <h2>Inspector</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Output</summary>
                                <div class="accordion-body"><p class="status" role="status">Not implemented yet.</p></div>
                            </details>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script src="../../assets/theme-v2/js/tool-display-mode.js" defer></script>
</body>

</html>
