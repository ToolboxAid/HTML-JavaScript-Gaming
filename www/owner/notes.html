<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notes - Game Foundry Studio</title>
    <meta name="description" content="Owner route for Admin/Owner Notes loaded from dev/archive/legacy-docs-build/admin-notes.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../assets/theme-v2/css/theme.css">
</head>

<body>
    <div data-partial="header-nav"></div>
    <main data-owner-notes data-admin-notes-viewer>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Owner</div>
                <h1>Notes</h1>
                <p class="lede">Admin/Owner Notes loaded from dev/archive/legacy-docs-build/admin-notes/.</p>
            </div>
        </section>
        <section class="section">
            <div class="container account-panel">
                <aside class="side-menu" aria-label="Owner business pages" data-owner-tool-menu>
                    <p class="status" data-owner-nav-loading>Loading Owner tools.</p>
                </aside>
                <div class="admin-page-stack">
                    <article class="card">
                        <div class="card-body">
                            <div class="section-heading">
                                <div>
                                    <div class="kicker">Loaded Note</div>
                                    <h2 data-admin-notes-title>index.txt</h2>
                                </div>
                                <p class="status" data-admin-notes-status>Loading dev/archive/legacy-docs-build/admin-notes/index.txt.</p>
                            </div>
                            <div data-admin-notes-content></div>
                        </div>
                    </article>
                    <article class="card" data-admin-notes-directory>
                        <div class="card-body">
                            <div class="content-stack">
                                <div class="kicker">Source Folder</div>
                                <div class="section-heading">
                                    <h3>Current Folder: <span data-admin-notes-current-folder>admin-notes</span></h3>
                                    <button class="btn btn--compact" type="button" data-admin-notes-parent-folder disabled>..</button>
                                </div>
                                <h4>Open folders:</h4>
                                <div class="cluster" data-admin-notes-folder-links></div>
                                <h4>Open files:</h4>
                                <div class="cluster" data-admin-notes-file-links></div>
                                <p class="status" data-admin-notes-folder-diagnostic></p>
                            </div>
                        </div>
                    </article>
                    <article class="card">
                        <div class="card-body">
                            <h3>Status Legend</h3>
                            <p class="cluster" data-admin-notes-legend-list></p>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script type="module" src="../assets/theme-v2/js/admin-owner-navigation.js"></script>
    <script type="module" src="../src/dev-runtime/admin/admin-notes-viewer.js"></script>
</body>

</html>
