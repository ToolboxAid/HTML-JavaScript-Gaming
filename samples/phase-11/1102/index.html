<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

<body class="hub-page-samples">
  <div id="shared-theme-header"></div>
  <main>
    <h1>sample 1102 - Accessibility Options</h1>
    <p>Demonstrates high contrast, reduced motion, scalable UI, and input comfort presets.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="accessibility-scale" type="button">Scale UI</button>
      <button id="accessibility-contrast" type="button">Toggle Contrast</button>
      <button id="accessibility-motion" type="button">Toggle Reduced Motion</button>
      <button id="accessibility-comfort" type="button">Cycle Comfort</button>
      <button id="accessibility-save" type="button">Save</button>
    </section>
      <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>AccessibilityOptions</li>
        <li>Scene</li>
      </ul>
    </section>
  </main>
  <script type="module" src="/samples/shared/sampleDetailPageEnhancement.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="../../../src/engine/theme/mount-shared-header.js"></script>
