<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample124 - Synthesizer</title>
  <link rel="stylesheet" href="../_shared/sampleLayout.css" />
</head>
<body>
  <main>
    <h1>Sample124 - Synthesizer</h1>
    <p>Demonstrates generated sound output through a reusable synth capability.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <label for="waveform">Waveform</label>
      <select id="waveform">
        <option value="sawtooth">Sawtooth</option>
        <option value="triangle">Triangle</option>
        <option value="sine">Sine</option>
        <option value="square">Square</option>
      </select>
      <button id="play-low" type="button">Play Low</button>
      <button id="play-high" type="button">Play High</button>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
