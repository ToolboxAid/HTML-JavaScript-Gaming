<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../../../src/engine/theme/main.css" />

<body class="hub-page-samples">
  <div id="shared-theme-header"></div>
  <main>
    <h1>sample 0803 - Synthesizer</h1>
    <p>Demonstrates generated sound output through a reusable synth capability.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <label for="waveform">Waveform</label>
      <select id="waveform">
        <option value="sawtooth">Sawtooth</option>
        <option value="triangle">Triangle</option>
        <option value="sine">Sine</option>
        <option value="square">Square</option>
      </select>
      <button id="play-low" type="button">Play Low</button>
      <button id="play-high" type="button">Play High</button>
    </section>
      <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>Scene</li>
        <li>Synthesizer</li>
      </ul>
    </section>
  </main>
  <script type="module" src="/samples/shared/sampleDetailPageEnhancement.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="../../../src/engine/theme/mount-shared-header.js"></script>
</body>
