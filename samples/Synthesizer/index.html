<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Synthesizer</title>
    <link rel="stylesheet" href="./synth.css">
    <script type="module" src="./synth.js" defer></script>
</head>

<body>
    <h1>Sample Synthesizer</h1>
    <a href="https://codepen.io/BretCameron/pen/MWmyWeo">Original Sample</a>
    <a href="https://css-tricks.com/how-to-code-a-playable-synth-keyboard/">Original Tutorial</a>
    <p>Browser audio may stay muted until your first click/key press. Interact once to unlock sound.</p>

    <ul id="keyboard">
        <li note="C" class="white">A</li>
        <li note="C#" class="black">W</li>
        <li note="D" class="white offset">S</li>
        <li note="D#" class="black">E</li>
        <li note="E" class="white offset">D</li>
        <li note="F" class="white">F</li>
        <li note="F#" class="black">T</li>
        <li note="G" class="white offset">G</li>
        <li note="G#" class="black">Y</li>
        <li note="A" class="white offset">H</li>
        <li note="A#" class="black">U</li>
        <li note="B" class="white offset">J</li>
        <li note="C2" class="white">K</li>
        <li note="C#2" class="black">O</li>
        <li note="D2" class="white offset">L</li>
        <li note="D#2" class="black">P</li>
        <li note="E2" class="white offset">;</li>
    </ul>
    <br>
    <p>
        <label for="time-signature">Time Signature:</label>

        <input type="text" id="time-signature" value="4/4">
    </p>
    <p id="control-error" role="status" aria-live="polite"></p>
    <br>
    <p>
        <label for="tempo">Tempo (BPM):</label>
        <input type="number" id="tempo" value="290" step="1" min="30" max="300">
    </p>
    <br>
    <section id="sound-controls">
        <h2>Sound Controls</h2>
        <p>
            <label for="osc-type">Waveform:</label>
            <select id="osc-type">
                <option value="triangle" selected>Triangle</option>
                <option value="sine">Sine</option>
                <option value="square">Square</option>
                <option value="sawtooth">Sawtooth</option>
            </select>
        </p>
        <p>
            <label for="attack">Attack:</label>
            <input type="range" id="attack" min="0.001" max="1" step="0.001" value="0.01">
            <span id="attack-value">0.01</span>
        </p>
        <p>
            <label for="release">Release:</label>
            <input type="range" id="release" min="0.05" max="2" step="0.01" value="0.5">
            <span id="release-value">0.5</span>
        </p>
        <p>
            <label for="vibrato-depth">Vibrato Depth:</label>
            <input type="range" id="vibrato-depth" min="0" max="20" step="0.1" value="5">
            <span id="vibrato-depth-value">5</span>
        </p>
        <p>
            <label for="delay-amount">Delay Mix:</label>
            <input type="range" id="delay-amount" min="0" max="0.8" step="0.01" value="0.2">
            <span id="delay-amount-value">0.2</span>
        </p>
    </section>
    <br>
    <p>
        <button id="play-frogger-music">Play 'Frogger' Music</button>
        <button id="play-mountain-music">Play 'Comming around the mountain' Music</button>
        <button id="play-twinkle-music">Play 'Twinkle Twinkle Little Star' Music</button>
        <button id="play-piano-music">Play 'Piano' Music</button>
        <br>
        <button id="stop-all-notes">Stop / Panic</button>
    </p>
</body>

</html>
