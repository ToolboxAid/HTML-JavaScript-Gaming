<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample140 - Audio Playlist / Track Management</title>
  <link rel="stylesheet" href="../_shared/sampleLayout.css" />
</head>
<body>
  <main>
    <h1>Sample140 - Audio Playlist / Track Management</h1>
    <p>Demonstrates track ordering and playlist-style audio control.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="playlist-play" type="button">Play</button>
      <button id="playlist-pause" type="button">Pause</button>
      <button id="playlist-previous" type="button">Previous</button>
      <button id="playlist-next" type="button">Next</button>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
