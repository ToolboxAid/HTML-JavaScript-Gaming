<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample 1501 - Developer Console</title>
  <link rel="stylesheet" href="../../../src/engine/ui/baseLayout.css" />
  <link rel="stylesheet" href="../../../src/engine/theme/main.css" />
</head>
<body class="hub-page-samples">
  <div id="shared-theme-header"></div>
  <main>
    <h1>Sample 1501 - Developer Console</h1>
    <p>Executes runtime commands through a reusable developer console.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="console-help" type="button">Run `help`</button>
      <button id="console-heal" type="button">Run `heal 3`</button>
      <button id="console-unknown" type="button">Run Bad Command</button>
    </section>
    <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>DeveloperConsole</li>
        <li>Scene</li>
      </ul>
    </section>
  </main>
  <script type="module" src="/samples/shared/sampleDetailPageEnhancement.js"></script>
  <script type="module" src="./main.js"></script>
  <script type="module" src="../../../src/engine/theme/mount-shared-header.js"></script>
</body>
</html>
