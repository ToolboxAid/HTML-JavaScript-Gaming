<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player Example</title>
    <script type="module" src="./audio.js" defer></script>
</head>
<body>
    <h1>Audio Player Example</h1>
    <p>Browser audio may require one click before sound starts.</p>
    <p id="status" role="status" aria-live="polite">Waiting for audio initialization...</p>
    <p id="error" role="alert" aria-live="assertive"></p>
    <div>
        <label for="selected-audio">Audio sample:</label>
        <select id="selected-audio">
            <option value="elemental-magic.mp3">elemental-magic.mp3</option>
            <option value="relaxing-guitar-loop.mp3">relaxing-guitar-loop.mp3</option>
            <option value="Alesis-Sanctuary.wav">Alesis-Sanctuary.wav</option>
            <option value="Ouch-6.wav">Ouch-6.wav</option>
        </select>
        <button id="play-selected">Play Selected</button>
        <button id="stop-looping">Stop Looping</button>
    </div>
</body>
</html>
