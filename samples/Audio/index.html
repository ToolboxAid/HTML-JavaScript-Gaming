<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player Example</title>
    <script type="module" src="./audio.js" defer></script>
</head>
<body>
    <h1>Audio Player Example</h1>
    <p>Browser audio may require one click before sound starts.</p>
    <p id="status" role="status" aria-live="polite">Waiting for audio initialization...</p>
    <p id="error" role="alert" aria-live="assertive"></p>
    <div>
        <label for="selected-audio">Audio sample:</label>
        <select id="selected-audio"></select>
        <button id="play-selected">Play Selected</button>
        <button id="stop-all">Stop All</button>
    </div>
</body>
</html>
