<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample25 - Camera Follow</title>
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #333332;
    }

    main {
      width: min(100%, 1000px);
      padding: 20px;
      box-sizing: border-box;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 960px;
      height: auto;
      border: 1px solid #334155;
    }

    p {
      line-height: 1.5;
    }
  </style>
</head>
<body>
    <main>
        <h1>Sample25 - Camera Follow</h1>
        <p>Demonstrates a larger world with a camera that follows the player as the viewport scrolls across the map.</p>
        <canvas id="game" width="960" height="540"></canvas>
    </main>

    <script type="module" src="./main.js"></script>
</body>
</html>
