<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Engine V2 Sample08 - Render Adapter</title>
  <style>
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #333332;
    }

    main {
      width: min(100%, 1000px);
      padding: 20px;
      box-sizing: border-box;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 960px;
      height: auto;
      border: 1px solid #334155;
    }

    p {
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Engine V2 Sample08</h1>
    <p>
      Demonstrates the render adapter abstraction. Rendering is performed through a renderer,
      not direct canvas calls, so scenes stay decoupled from the concrete canvas context.
    </p>
    <canvas id="game" width="960" height="540"></canvas>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
