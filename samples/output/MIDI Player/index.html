<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDI Player Example</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: Arial, sans-serif;
            gap: 0.5rem;
        }

        #cntls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
    <script type="module" src="./midiPlayerSample.js" defer></script>
</head>
<body>
    <h1>MIDI Player Example</h1>
    <p id="status" role="status" aria-live="polite">Initializing MIDI player...</p>
    <p id="error" role="alert" aria-live="assertive"></p>
    <div id='cntls'>
        <input type="file" id="filesinput" name="filesarr[]" accept=".mid,.midi,.kar" />
        <button type="button" id="play-button">Play</button>
        <button type="button" id="pause-button">Pause</button>
        <button type="button" id="stop-button">Stop</button>
        <input id="position" type="range" min="0" max="100" value="0">
        <label for="autoplay">
            <input type="checkbox" id="autoplay" checked>
            Autoplay
        </label>
    </div>
</body>
</html>
