<body>
  <main>
    <h1>sample 1105 - Crash Recovery / Fallback Flow</h1>
    <p>Handles runtime failures gracefully and restores a usable fallback state.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="recovery-safe" type="button">Run Safe Step</button>
      <button id="recovery-crash" type="button">Trigger Crash</button>
      <button id="recovery-restore" type="button">Restore Last Crash</button>
      <button id="recovery-clear" type="button">Clear Crash State</button>
    </section>
      <section>
