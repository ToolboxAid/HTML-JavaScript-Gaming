<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>sample 1101 - Settings System</title>
  <link rel="stylesheet" href="../../../engine/ui/baseLayout.css" />
</head>
<body>
  <main>
    <h1>sample 1101 - Settings System</h1>
    <p>Stores reusable audio, video, and gameplay preferences through an engine-owned settings service.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="settings-load" type="button">Load</button>
      <button id="settings-save" type="button">Save</button>
      <button id="settings-volume" type="button">Music +10%</button>
      <button id="settings-fullscreen" type="button">Toggle Fullscreen Pref</button>
      <button id="settings-difficulty" type="button">Cycle Difficulty</button>
      <button id="settings-reset" type="button">Reset Defaults</button>
    </section>
      <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>SettingsSystem</li>
        <li>Scene</li>
      </ul>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
