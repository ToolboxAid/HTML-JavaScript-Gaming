<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample 1502 - In-Engine Inspector</title>

</head>
<body>
  <main>
    <h1>Sample 1502 - In-Engine Inspector</h1>
    <p>Inspects runtime object state through an engine-owned tooling view.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="inspect-player" type="button">Inspect Player</button>
      <button id="inspect-system" type="button">Inspect System</button>

      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>RuntimeInspector</li>
        <li>Scene</li>
      </ul>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
