<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample126 - Particle FX</title>
  <link rel="stylesheet" href="../../engine/ui/baseLayout.css" />
</head>
<body>
  <main>
    <h1>Sample126 - Explosion / Particle FX</h1>
    <p>Demonstrates reusable explosion and particle effect lifecycle.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="trigger-explosion" type="button">Square Burst</button>
      <button id="trigger-random-explosion" type="button">Random Square</button>
      <button id="trigger-circle-explosion" type="button">Circle Burst</button>
      <button id="trigger-random-circle-explosion" type="button">Random Circle</button>
      <button id="trigger-diamond-explosion" type="button">Diamond Burst</button>
      <button id="trigger-random-diamond-explosion" type="button">Random Diamond</button>
    </section>
      <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>Scene</li>
        <li>ParticleSystem</li>
      </ul>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
