<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Network Sample C Debug Showcase</title>
  <desc id="desc">Divergence and trace validation preview with deterministic mismatch and checklist telemetry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#081424" />
      <stop offset="100%" stop-color="#204067" />
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="40" y="40" width="880" height="460" rx="16" fill="#0d1f35" stroke="#4a7bb0" stroke-width="2" />

  <text x="72" y="92" fill="#e6f3ff" font-size="34" font-family="monospace" font-weight="700">NETWORK SAMPLE C</text>
  <text x="72" y="124" fill="#9fc7eb" font-size="18" font-family="monospace">Divergence / Trace Validation</text>

  <rect x="72" y="154" width="390" height="148" rx="10" fill="#0f2238" stroke="#4e78a4" />
  <text x="92" y="184" fill="#d4edff" font-size="17" font-family="monospace">status: warning</text>
  <text x="92" y="212" fill="#f9c74f" font-size="17" font-family="monospace">frameDelta: 12</text>
  <text x="92" y="240" fill="#d4edff" font-size="17" font-family="monospace">phase: divergence-observed</text>
  <text x="92" y="268" fill="#d4edff" font-size="17" font-family="monospace">cycle: deterministic</text>

  <rect x="496" y="154" width="392" height="148" rx="10" fill="#0f2238" stroke="#4e78a4" />
  <text x="516" y="184" fill="#d4edff" font-size="17" font-family="monospace">Validation Checklist</text>
  <text x="516" y="212" fill="#9fc7eb" font-size="15" font-family="monospace">[x] mismatch observed</text>
  <text x="516" y="236" fill="#9fc7eb" font-size="15" font-family="monospace">[x] sequence captured</text>
  <text x="516" y="260" fill="#f9c74f" font-size="15" font-family="monospace">[.] reconcile pending</text>

  <rect x="72" y="336" width="816" height="126" rx="10" fill="#0f2238" stroke="#4e78a4" />
  <text x="92" y="372" fill="#b6defe" font-size="16" font-family="monospace">network.divergence | network.trace | network.validate</text>
  <text x="92" y="398" fill="#b6defe" font-size="16" font-family="monospace">Play first, then Debug Mode for validation flow</text>
  <text x="92" y="424" fill="#b6defe" font-size="16" font-family="monospace">Level 11 deterministic mismatch trace sample</text>

  <circle cx="840" cy="86" r="14" fill="#14b8a6" />
  <text x="72" y="496" fill="#7fa9d0" font-size="14" font-family="monospace">/games/network_sample_c/index.html</text>
</svg>
