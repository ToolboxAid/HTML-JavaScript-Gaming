<body>
  <main>
    <h1>Sample130 - Save Slots / Profiles</h1>
    <p>Demonstrates multiple persisted identities through a reusable save-slot manager.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="slot-a" type="button">Slot A</button>
      <button id="slot-b" type="button">Slot B</button>
      <button id="slot-c" type="button">Slot C</button>
      <button id="increase-hp" type="button">Increase HP</button>
      <button id="save-slot" type="button">Save</button>
      <button id="load-slot" type="button">Load</button>
    </section>
      <section>
