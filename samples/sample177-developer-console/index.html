<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample177 - Developer Console</title>
  <link rel="stylesheet" href="../../engine/ui/baseLayout.css" />
</head>
<body>
  <main>
    <h1>Sample177 - Developer Console</h1>
    <p>Executes runtime commands through a reusable developer console.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="console-help" type="button">Run `help`</button>
      <button id="console-heal" type="button">Run `heal 3`</button>
      <button id="console-unknown" type="button">Run Bad Command</button>
    </section>
    <section>
      <h3>Engine Classes Used</h3>
      <ul>
        <li>Engine</li>
        <li>Theme</li>
        <li>DeveloperConsole</li>
        <li>Scene</li>
      </ul>
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
