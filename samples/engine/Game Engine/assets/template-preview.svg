<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Game engine template preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f2f2f" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="155" y="70" width="650" height="420" rx="12" ry="12" fill="#888888" stroke="#f5f5f5" stroke-width="4" />
  <text x="480" y="130" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="32" fill="#ffffff">Game Engine Template</text>
  <text x="480" y="245" text-anchor="middle" font-family="Segoe UI, Tahoma, sans-serif" font-size="24" fill="#ffffff">Welcome to the Game!</text>
