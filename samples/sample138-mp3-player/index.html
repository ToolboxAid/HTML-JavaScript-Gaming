<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sample138 - MP3 Player</title>
  <link rel="stylesheet" href="../_shared/sampleLayout.css" />
</head>
<body>
  <main>
    <h1>Sample138 - MP3 Player</h1>
    <p>Demonstrates engine-owned MP3-style media controls.</p>
    <canvas id="game" width="960" height="540"></canvas>
    <section>
      <button id="mp3-play" type="button">Play</button>
      <button id="mp3-pause" type="button">Pause</button>
      <button id="mp3-stop" type="button">Stop</button>
      <button id="mp3-seek" type="button">Seek 4s</button>
      <label for="mp3-seek-start">Start</label>
      <input id="mp3-seek-start" type="number" min="0" step="0.5" value="2" />
      <label for="mp3-play-duration">Seconds</label>
      <input id="mp3-play-duration" type="number" min="0.5" step="0.5" value="3" />
      <button id="mp3-play-segment" type="button">Play Segment</button>
      <button id="mp3-loop" type="button">Loop On</button>
      <button id="mp3-unloop" type="button">Loop Off</button>
      <label for="mp3-volume">Volume</label>
      <input id="mp3-volume" type="range" min="0" max="1" step="0.1" value="0.4" />
    </section>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
