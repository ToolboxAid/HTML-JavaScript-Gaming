  <text x="236" y="348" font-family="Segoe UI, Tahoma, sans-serif" font-size="9" fill="#f3d8ab">USB gamepad (Vendor: 081f Product: e401)</text>
  <circle cx="246" cy="368" r="7" fill="#ff5f57" stroke="#ffffff" stroke-width="1"/>
  <circle cx="264" cy="368" r="7" fill="#666666" stroke="#ffffff" stroke-width="1"/>
  <circle cx="282" cy="368" r="7" fill="#666666" stroke="#ffffff" stroke-width="1"/>
  <circle cx="300" cy="368" r="7" fill="#ff5f57" stroke="#ffffff" stroke-width="1"/>
  <circle cx="318" cy="368" r="7" fill="#666666" stroke="#ffffff" stroke-width="1"/>
  <text x="344" y="366" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" fill="#ff5f57">dPad:</text>
  <text x="378" y="366" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" fill="#ffffff">Left</text>
  <text x="344" y="382" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" fill="#ff5f57">DPadX:</text>
  <text x="388" y="382" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" fill="#ffffff">-1.00</text>

  <rect x="520" y="314" width="218" height="82" rx="12" fill="#140830" stroke="#4dd8ff" stroke-width="2"/>
  <text x="536" y="334" font-family="Segoe UI, Tahoma, sans-serif" font-size="11" fill="#4dd8ff">P2 Logitech RumblePad 2</text>
  <text x="536" y="348" font-family="Segoe UI, Tahoma, sans-serif" font-size="9" fill="#f3d8ab">STANDARD GAMEPAD Vendor: 046d Product: c218</text>
  <circle cx="546" cy="368" r="7" fill="#666666" stroke="#ffffff" stroke-width="1"/>
  <circle cx="564" cy="368" r="7" fill="#4dd8ff" stroke="#ffffff" stroke-width="1"/>
  <circle cx="582" cy="368" r="7" fill="#666666" stroke="#ffffff" stroke-width="1"/>
  <circle cx="600" cy="368" r="7" fill="#666666" stroke="#ffffff" stroke-width="1"/>
