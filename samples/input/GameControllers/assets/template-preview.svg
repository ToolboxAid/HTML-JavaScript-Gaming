  <text x="644" y="382" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" fill="#4dd8ff">StickLeftX:</text>
  <text x="710" y="382" font-family="Segoe UI, Tahoma, sans-serif" font-size="10" fill="#ffffff">0.42</text>
