<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Home - GameFoundryStudio</title>
    <meta name="description" content="Plan the personal account workspace for GameFoundryStudio creators.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../assets/theme-v2/css/theme.css">
</head>

<body>
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Account</div>
                <h1>Account Home</h1>
                <p class="lede">A planning view for the creator-owned profile, preferences and security surfaces.</p>
            </div>
        </section>
        <section class="section">
            <div class="container account-panel">
                <div data-partial="account-side-nav" data-partial-replace></div>
                <div class="card" data-local-db-page="account-home">
                    <div class="card-body content-stack">
                        <div>
                            <div class="kicker">Local DB</div>
                            <h2>Account Summary</h2>
                        </div>
                        <p class="status" role="status" data-local-db-status>Loading Local DB account summary.</p>
                        <div class="content-stack" data-local-db-content></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script type="module" src="../assets/theme-v2/js/local-db-page-data.js"></script>
</body>

</html>
