<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Template</title>
  <link rel="stylesheet" href="/src/engine/ui/baseLayout.css" />
  <link rel="stylesheet" href="../../src/engine/theme/main.css" />
</head>
<body class="hub-page-games">
  <div id="shared-theme-header"></div>
  <main>
    <h1>Game Template</h1>
    <p>Replace this entrypoint with your game-specific shell.</p>
    <canvas id="game" width="960" height="720" aria-label="Template game canvas"></canvas>
  </main>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    if (ctx) {
      const x = 48;
      const y = 96;
      const lineHeight = 38;

      ctx.fillStyle = "#f8fafc";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#0f172a";
      ctx.font = "bold 34px Arial, sans-serif";
      ctx.fillText("HTML Says", x, y);

      ctx.font = "bold 30px Arial, sans-serif";
      ctx.fillText("Template Status", x, y + lineHeight + 8);

      ctx.font = "26px Arial, sans-serif";
      ctx.fillText(
        "This template intentionally does not boot gameplay.",
        x,
        y + (lineHeight * 2) + 20
      );
    }
  </script>
  <script type="module" src="../../src/engine/theme/mount-shared-header.js"></script>
</body>
</html>
