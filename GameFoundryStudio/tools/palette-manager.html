<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Palette Manager — Game Foundry Studio</title>
    <meta name="description" content="Game Foundry Studio: Build. Play. Share.">
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body class="meaning-molten-orange">
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Pixel Smith</div>
                <h1>Palette Manager</h1>
                <p class="lede">Craft and manage color palettes for your games.</p>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div class="tool-workspace">
                    <aside class="tool-column">
                        <div class="tool-column-header molten-orange">
                            <h2>Toolbox</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Setup</summary>
                                <div class="accordion-body">Palette Manager setup wireframe.</div>
                            </details>
                        </div>
                    </aside>
                    <div data-tool-display-mode></div>
                    <section class="tool-center-panel"><img src="../assets/images/forge-bot.png" alt="ForgeBot">
                        <h2>Workspace</h2>
                        <p>Use this center region for the primary tool canvas, editor, preview, or guided workflow.</p>
                    </section>
                    <aside class="tool-column">
                        <div class="tool-column-header forge-gold">
                            <h2>Inspector</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Output</summary>
                                <div class="accordion-body">Palette Manager output wireframe.</div>
                            </details>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/js/gamefoundry-partials.js" defer></script>
    <script src="../assets/js/tool-display-mode.js" defer></script>
</body>

</html>
