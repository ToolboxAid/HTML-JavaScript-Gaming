<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game Hub - GameFoundryStudio</title>
    <meta name="description" content="Game Hub Toolbox page for game identity, progress, and publish readiness.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="assets/theme-v2/css/theme.css">
</head>

<body class="meaning-electric-blue">
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Toolbox / Game Hub</div>
                <h1>Game Hub</h1>
                <p class="lede">Create, open, and delete games while reviewing progress and publish readiness.</p>
            </div>
        </section>
        <section class="section">
            <div class="container container--tool-wide">
                <div class="tool-workspace tool-workspace--wide">
                    <aside class="tool-column tool-group-build">
                        <div class="tool-column-header">
                            <h2>Game Actions</h2>
                        </div>
                        <div class="content-stack content-stack--compact">
                            <button class="btn" type="button" data-game-delete-active>Delete Open Game</button>
                        </div>
                    </aside>
                    <div data-tool-display-mode data-asset-root="assets/theme-v2/images" data-tool-slug="game-hub" data-tool-icon-src="assets/theme-v2/images/badges/index.png" data-tool-character-src="assets/theme-v2/images/characters/index.png"></div>
                    <section class="tool-center-panel"><h2>Games</h2>
                        <div class="status" role="status" data-project-record-status>Game table ready.</div>
                        <div class="content-stack content-stack--compact" aria-label="Games" data-game-list></div>
                        <div class="status" role="status" data-game-hub-log>Game Hub ready.</div>
                    </section>
                    <aside class="tool-column tool-group-build">
                        <div class="tool-column-header">
                            <h2>Inspector</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Status Log</summary>
                                <div class="accordion-body">
                                    <p>Game Hub actions report status in the center panel.</p>
                                    <div class="status" role="status">Game data ready.</div>
                                </div>
                            </details>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script src="assets/theme-v2/js/tool-display-mode.js" defer></script>
    <script type="module" src="toolbox/game-hub/game-hub.js"></script>
</body>

</html>
