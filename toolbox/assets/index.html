<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Assets — Game Foundry Studio</title>
    <meta name="description" content="Game Foundry Studio: Build. Play. Share.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../../assets/theme-v2/css/theme.css">
</head>

<body class="meaning-molten-orange">
    <div data-partial="header-nav"></div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">Pixel Smith</div>
                <h1>Assets</h1>
                <p class="lede">Create sprites, animations, vectors and palettes.</p>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div class="tool-workspace">
                    <aside class="tool-column tool-group-content-assets">
                        <div class="tool-column-header molten-orange">
                            <h2>Toolbox</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Setup</summary>
                                <div class="accordion-body">Assets setup wireframe.</div>
                            </details>
                        </div>
                    </aside>
                    <div data-tool-display-mode data-asset-root="../../assets/theme-v2/images" data-tool-slug="asset-studio" data-tool-icon-src="../../assets/theme-v2/images/badges/asset-studio.png"></div>
                    <section class="tool-center-panel"><img src="../../assets/theme-v2/images/forge-bot-single.png" alt="ForgeBot">
                        <h2>Workspace</h2>
                        <p>Assets: Create sprites, animations, vectors and palettes.</p>
                    </section>
                    <aside class="tool-column tool-group-content-assets">
                        <div class="tool-column-header forge-gold">
                            <h2>Inspector</h2>
                        </div>
                        <div class="accordion-stack">
                            <details class="vertical-accordion" open>
                                <summary>Output</summary>
                                <div class="accordion-body">Assets output wireframe.</div>
                            </details>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script src="../../assets/theme-v2/js/tool-display-mode.js" defer></script>
</body>

</html>
