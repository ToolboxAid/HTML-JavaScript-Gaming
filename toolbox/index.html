<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toolbox - GameFoundryStudio</title>
    <meta name="description" content="GameFoundryStudio creator toolbox.">
    <link rel="icon" href="/favicon.svg">
    <link rel="stylesheet" href="../assets/theme-v2/css/theme.css">
</head>

<body>
    <div data-partial="header-nav"></div>
    <div class="container callout section-head" aria-label="Toolbox role simulation">
        <a class="status" href="toolbox/index.html?role=user" data-toolbox-role-banner>GUEST VIEW • Preview only • Sign in to create</a>
        <details class="status" data-project-data-menu hidden>
            <summary>Project Data ▾</summary>
            <div class="content-stack content-stack--compact" aria-label="Project Data actions">
                <button class="btn" type="button" data-project-data-action="reset">Reset Project Data</button>
                <button class="btn" type="button" data-project-data-action="seed">Seed Demo Project</button>
                <button class="btn" type="button" data-project-data-action="clear">Clear Test Data</button>
                <div class="status" role="status" data-project-data-status>Project Data controls are mock-only.</div>
            </div>
        </details>
    </div>
    <main>
        <section class="page-title">
            <div class="container">
                <div class="kicker">The Toolbox</div>
                <h1>Creator tools organized by build surface.</h1>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div class="hero-actions" aria-label="Toolbox views">
                    <button class="btn" type="button" data-tools-order="ascending" aria-pressed="true">Order A-Z</button>
                    <button class="btn" type="button" data-tools-sort="grouped" aria-pressed="false">Group</button>
                    <button class="btn" type="button" data-tools-view="progress" aria-pressed="false">Progress</button>
                    <button class="btn" type="button" data-tools-view="build-path" aria-pressed="false">Build Path</button>
                    <span class="pill" data-tools-count>Tool Count: 0/0</span>
                </div>
                <div class="accordion-group" data-tools-accordion-list></div>
            </div>
        </section>
    </main>
    <div data-partial="footer"></div>
    <script src="../assets/theme-v2/js/gamefoundry-partials.js" defer></script>
    <script type="module" src="tools-page-accordions.js"></script>
</body>

</html>
